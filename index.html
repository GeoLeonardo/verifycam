<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="theme-color" content="#000000">
<title>ВерифиКам</title>
<link rel="manifest" href="manifest.json">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }

:root {
  --green: #00ff88;
  --yellow: #ffc107;
  --red: #ff3355;
  --blue: #29b6f6;
  --bg: #000;
  --dim: rgba(255,255,255,.45);
}

html, body {
  width:100%; height:100%; overflow:hidden;
  background:#000; color:#fff;
  font-family: 'Courier New', Courier, monospace;
  -webkit-user-select:none; user-select:none;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}

/* ===================== LOADING ===================== */
#scr-load {
  position:fixed; inset:0; background:#000; z-index:200;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px;
}
.brand {
  font-size:26px; font-weight:700; letter-spacing:7px; color:#fff;
}
.brand em { color:var(--green); font-style:normal; }
.ring {
  width:48px; height:48px; border-radius:50%;
  border:2px solid rgba(255,255,255,.08);
  border-top-color: var(--green);
  animation: spin .85s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg) } }
#load-step {
  font-size:10px; letter-spacing:2.5px; color:var(--dim);
  text-transform:uppercase; min-height:14px; text-align:center;
}

/* ===================== ERROR ===================== */
#scr-err {
  position:fixed; inset:0; background:#07070f; z-index:190;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:36px; gap:20px; text-align:center;
}
.err-icon  { font-size:66px; }
.err-head  { font-size:17px; font-weight:700; letter-spacing:2px; color:var(--red); }
.err-body  { font-size:12px; line-height:1.9; color:var(--dim); max-width:300px; white-space:pre-line; }
.pill-btn  {
  padding:12px 34px; background:transparent;
  border:1px solid var(--green); color:var(--green);
  font-family:inherit; font-size:11px; letter-spacing:3px;
  text-transform:uppercase; cursor:pointer; transition:.2s; margin-top:4px;
}
.pill-btn:active { background:var(--green); color:#000; }

/* ===================== GPS MODAL ===================== */
#gps-modal {
  position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:80;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:28px; gap:18px; text-align:center;
}
#gps-modal.on { display:flex; }
.gps-modal-ico   { font-size:60px; }
.gps-modal-title { font-size:17px; font-weight:700; letter-spacing:2px; color:var(--red); }
.gps-modal-text  { font-size:11px; line-height:2; color:var(--dim); max-width:290px; }

/* ===================== CAMERA SCREEN ===================== */
#scr-cam {
  position:fixed; inset:0; background:#000;
  display:none; /* shown by JS */
}

#video {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover; z-index:1;
}

/* grid overlay */
#vf {
  position:absolute; inset:0; z-index:2; pointer-events:none;
}
.gl { position:absolute; background:rgba(255,255,255,.13); }
.gh1 { top:33.33%; left:0; right:0; height:1px; }
.gh2 { top:66.66%; left:0; right:0; height:1px; }
.gv1 { left:33.33%; top:0; bottom:0; width:1px; }
.gv2 { left:66.66%; top:0; bottom:0; width:1px; }
.cor {
  position:absolute; width:22px; height:22px;
  border-color:rgba(255,255,255,.7); border-style:solid;
}
.c-tl { top:8%;    left:5%;  border-width:2px 0 0 2px; }
.c-tr { top:8%;    right:5%; border-width:2px 2px 0 0; }
.c-bl { bottom:20%; left:5%;  border-width:0 0 2px 2px; }
.c-br { bottom:20%; right:5%; border-width:0 2px 2px 0; }

/* HUD bar */
#hud {
  position:absolute; top:0; left:0; right:0; z-index:3;
  padding:11px 16px;
  display:flex; justify-content:space-between; align-items:center;
  background:linear-gradient(to bottom, rgba(0,0,0,.62), transparent);
}
#clock {
  font-size:16px; font-weight:700; letter-spacing:1px;
  text-shadow:0 1px 4px rgba(0,0,0,.9);
}
#gps-badge {
  font-size:10px; letter-spacing:.5px; font-weight:600;
  padding:4px 10px; border-radius:18px; transition:.3s;
}
#gps-badge.searching {
  background:rgba(255,193,7,.13); color:var(--yellow);
  border:1px solid var(--yellow);
  animation:pulse 1.1s ease-in-out infinite;
}
#gps-badge.active {
  background:rgba(0,255,136,.1); color:var(--green);
  border:1px solid var(--green);
}
#gps-badge.lost {
  background:rgba(255,51,85,.13); color:var(--red);
  border:1px solid var(--red);
  animation:pulse .55s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

/* client label */
#cid-label {
  position:absolute; z-index:3;
  left:0; right:0; text-align:center;
  bottom:calc(86px + env(safe-area-inset-bottom) + 18px);
  font-size:10px; letter-spacing:3px;
  color:rgba(255,255,255,.35); text-transform:uppercase;
}

/* zoom */
#zoom-row {
  position:absolute; z-index:3;
  bottom:calc(86px + env(safe-area-inset-bottom) + 58px);
  left:50%; transform:translateX(-50%);
  display:none; align-items:center; gap:10px;
}
#zoom-row.on { display:flex; }
#zoom-lbl { font-size:11px; color:var(--dim); width:32px; text-align:right; }
#zoom-range {
  -webkit-appearance:none; appearance:none;
  width:110px; height:3px;
  background:rgba(255,255,255,.22); border-radius:2px; outline:none;
}
#zoom-range::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:16px; height:16px; border-radius:50%;
  background:var(--green); cursor:pointer;
}

/* bottom controls */
#controls {
  position:absolute; bottom:0; left:0; right:0; z-index:3;
  padding:14px 40px calc(14px + env(safe-area-inset-bottom));
  display:flex; justify-content:space-between; align-items:center;
  background:linear-gradient(to top, rgba(0,0,0,.78), transparent);
}
.ic-btn {
  width:50px; height:50px; border-radius:50%;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18);
  color:#fff; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:.15s;
}
.ic-btn:active  { transform:scale(.85); background:rgba(255,255,255,.22); }
.ic-btn:disabled { opacity:.28; pointer-events:none; }
.ic-btn.torch-on { background:rgba(255,193,7,.2); border-color:var(--yellow); color:var(--yellow); }

#shutter {
  width:76px; height:76px; border-radius:50%;
  background:rgba(255,255,255,.88);
  border:3px solid rgba(255,255,255,.38);
  box-shadow:0 0 0 5px rgba(255,255,255,.1);
  cursor:pointer; position:relative; transition:.15s;
}
#shutter::after {
  content:''; position:absolute;
  top:50%; left:50%; transform:translate(-50%,-50%);
  width:60px; height:60px; border-radius:50%;
  background:rgba(255,255,255,.92);
}
#shutter:active  { transform:scale(.9); }
#shutter:disabled { opacity:.28; pointer-events:none; }
#shutter.no-gps::after { background:var(--red); }

/* flash */
#flash {
  position:fixed; inset:0; background:#fff;
  opacity:0; pointer-events:none; z-index:60;
  transition:opacity .1s;
}
#flash.pop { opacity:1; }

/* toast */
#toast {
  position:fixed;
  bottom:calc(102px + env(safe-area-inset-bottom));
  left:50%; transform:translateX(-50%) translateY(12px);
  background:rgba(0,255,136,.1); border:1px solid var(--green); color:var(--green);
  padding:9px 24px; border-radius:22px;
  font-size:11px; letter-spacing:2px; white-space:nowrap;
  opacity:0; transition:.28s; z-index:70; pointer-events:none;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* install — green V circle, top-right */
#btn-install {
  position:fixed; top:12px; right:14px; z-index:75;
  width:40px; height:40px; border-radius:50%;
  background:rgba(0,255,136,.12); border:2px solid var(--green);
  color:var(--green); font-size:20px; font-weight:900;
  font-family:'Courier New',monospace;
  cursor:pointer;
  display:none; align-items:center; justify-content:center;
}
#btn-install.on { display:flex; }

</style>
</head>
<body>

<!-- ===== LOADING ===== -->
<div id="scr-load">
  <div class="brand">Вери<em>Фи</em>Кам</div>
  <div class="ring"></div>
  <div id="load-step">Инициализация…</div>
</div>

<!-- ===== ERROR ===== -->
<div id="scr-err">
  <div class="err-icon" id="err-icon">⚠️</div>
  <div class="err-head"  id="err-head">Ошибка</div>
  <div class="err-body"  id="err-body"></div>
  <button class="pill-btn" onclick="retryInit()">↺ Повторить</button>
</div>

<!-- ===== GPS MODAL ===== -->
<div id="gps-modal">
  <div class="gps-modal-ico">📡</div>
  <div class="gps-modal-title">GPS НЕ ОПРЕДЕЛЁН</div>
  <div class="gps-modal-text">
    Съёмка без GPS невозможна.<br><br>
    1. Настройки → Местоположение → Включить<br>
    2. Разрешите геолокацию для Chrome<br>
    3. Выйдите на открытое место<br>
    4. Подождите 10–30 секунд
  </div>
  <button class="pill-btn" onclick="retryGPS()">↺ Повторить GPS</button>
</div>

<!-- ===== CAMERA ===== -->
<div id="scr-cam">
  <video id="video" autoplay playsinline muted></video>

  <div id="vf">
    <div class="gl gh1"></div><div class="gl gh2"></div>
    <div class="gl gv1"></div><div class="gl gv2"></div>
    <div class="cor c-tl"></div><div class="cor c-tr"></div>
    <div class="cor c-bl"></div><div class="cor c-br"></div>
  </div>

  <div id="hud">
    <span id="clock">00:00:00</span>
    <span id="gps-badge" class="searching">⌖ GPS…</span>
  </div>

  <div id="zoom-row">
    <span id="zoom-lbl">1×</span>
    <input type="range" id="zoom-range" min="1" max="5" step="0.1" value="1">
  </div>

  <div id="cid-label"></div>

  <div id="controls">
    <button class="ic-btn" id="btn-torch" onclick="toggleTorch()" title="Вспышка">🔦</button>
    <button id="shutter" onclick="shoot()" disabled></button>
    <button class="ic-btn" onclick="flipCam()" title="Переключить камеру">⟳</button>
  </div>
</div>

<!-- ===== UTILS ===== -->
<div id="flash"></div>
<div id="toast"></div>
<button id="btn-install" onclick="doInstall()" title="Установить приложение">V</button>
<canvas id="cv" style="display:none"></canvas>

<script>
/* ============================================================

   Offline, no CDN, embedded directly
   ============================================================ */
/*
 * QR Code generator library (TypeScript)

 *   out of or in connection with the Software or the use or other dealings in the
 *   Software.

"use strict";
var qrcodegen;
(function (qrcodegen) {
    /*---- QR Code symbol class ----*/
    /*
     * A QR Code symbol, which is a type of two-dimension barcode.
     * Invented by Denso Wave and described in the ISO/IEC 18004 standard.
     * Instances of this class represent an immutable square grid of dark and light cells.
     * The class provides static factory functions to create a QR Code from text or binary data.
     * The class covers the QR Code Model 2 specification, supporting all versions (sizes)
     * from 1 to 40, all 4 error correction levels, and 4 character encoding modes.
     *
     * Ways to create a QR Code object:
     * - High level: Take the payload data and call QrCode.encodeText() or QrCode.encodeBinary().
     * - Mid level: Custom-make the list of segments and call QrCode.encodeSegments().
     * - Low level: Custom-make the array of data codeword bytes (including
     *   segment headers and final padding, excluding error correction codewords),
     *   supply the appropriate version number, and call the QrCode() constructor.
     * (Note that all ways require supplying the desired error correction level.)
     */
    class QrCode {
        /*-- Constructor (low level) and fields --*/
        // Creates a new QR Code with the given version number,
        // error correction level, data codeword bytes, and mask number.
        // This is a low-level API that most users should not use directly.
        // A mid-level API is the encodeSegments() function.
        constructor(
        // The version number of this QR Code, which is between 1 and 40 (inclusive).
        // This determines the size of this barcode.
        version, 
        // The error correction level used in this QR Code.
        errorCorrectionLevel, dataCodewords, msk) {
            this.version = version;
            this.errorCorrectionLevel = errorCorrectionLevel;
            // The modules of this QR Code (false = light, true = dark).
            // Immutable after constructor finishes. Accessed through getModule().
            this.modules = [];
            // Indicates function modules that are not subjected to masking. Discarded when constructor finishes.
            this.isFunction = [];
            // Check scalar arguments
            if (version < QrCode.MIN_VERSION || version > QrCode.MAX_VERSION)
                throw new RangeError("Version value out of range");
            if (msk < -1 || msk > 7)
                throw new RangeError("Mask value out of range");
            this.size = version * 4 + 17;
            // Initialize both grids to be size*size arrays of Boolean false
            let row = [];
            for (let i = 0; i < this.size; i++)
                row.push(false);
            for (let i = 0; i < this.size; i++) {
                this.modules.push(row.slice()); // Initially all light
                this.isFunction.push(row.slice());
            }
            // Compute ECC, draw modules
            this.drawFunctionPatterns();
            const allCodewords = this.addEccAndInterleave(dataCodewords);
            this.drawCodewords(allCodewords);
            // Do masking
            if (msk == -1) { // Automatically choose best mask
                let minPenalty = 1000000000;
                for (let i = 0; i < 8; i++) {
                    this.applyMask(i);
                    this.drawFormatBits(i);
                    const penalty = this.getPenaltyScore();
                    if (penalty < minPenalty) {
                        msk = i;
                        minPenalty = penalty;
                    }
                    this.applyMask(i); // Undoes the mask due to XOR
                }
            }
            assert(0 <= msk && msk <= 7);
            this.mask = msk;
            this.applyMask(msk); // Apply the final choice of mask
            this.drawFormatBits(msk); // Overwrite old format bits
            this.isFunction = [];
        }
        /*-- Static factory functions (high level) --*/
        // Returns a QR Code representing the given Unicode text string at the given error correction level.
        // As a conservative upper bound, this function is guaranteed to succeed for strings that have 738 or fewer
        // Unicode code points (not UTF-16 code units) if the low error correction level is used. The smallest possible
        // QR Code version is automatically chosen for the output. The ECC level of the result may be higher than the
        // ecl argument if it can be done without increasing the version.
        static encodeText(text, ecl) {
            const segs = qrcodegen.QrSegment.makeSegments(text);
            return QrCode.encodeSegments(segs, ecl);
        }
        // Returns a QR Code representing the given binary data at the given error correction level.
        // This function always encodes using the binary segment mode, not any text mode. The maximum number of
        // bytes allowed is 2953. The smallest possible QR Code version is automatically chosen for the output.
        // The ECC level of the result may be higher than the ecl argument if it can be done without increasing the version.
        static encodeBinary(data, ecl) {
            const seg = qrcodegen.QrSegment.makeBytes(data);
            return QrCode.encodeSegments([seg], ecl);
        }
        /*-- Static factory functions (mid level) --*/
        // Returns a QR Code representing the given segments with the given encoding parameters.
        // The smallest possible QR Code version within the given range is automatically
        // chosen for the output. Iff boostEcl is true, then the ECC level of the result
        // may be higher than the ecl argument if it can be done without increasing the
        // version. The mask number is either between 0 to 7 (inclusive) to force that
        // mask, or -1 to automatically choose an appropriate mask (which may be slow).
        // This function allows the user to create a custom sequence of segments that switches
        // between modes (such as alphanumeric and byte) to encode text in less space.
        // This is a mid-level API; the high-level API is encodeText() and encodeBinary().
        static encodeSegments(segs, ecl, minVersion = 1, maxVersion = 40, mask = -1, boostEcl = true) {
            if (!(QrCode.MIN_VERSION <= minVersion && minVersion <= maxVersion && maxVersion <= QrCode.MAX_VERSION)
                || mask < -1 || mask > 7)
                throw new RangeError("Invalid value");
            // Find the minimal version number to use
            let version;
            let dataUsedBits;
            for (version = minVersion;; version++) {
                const dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8; // Number of data bits available
                const usedBits = QrSegment.getTotalBits(segs, version);
                if (usedBits <= dataCapacityBits) {
                    dataUsedBits = usedBits;
                    break; // This version number is found to be suitable
                }
                if (version >= maxVersion) // All versions in the range could not fit the given data
                    throw new RangeError("Data too long");
            }
            // Increase the error correction level while the data still fits in the current version number
            for (const newEcl of [QrCode.Ecc.MEDIUM, QrCode.Ecc.QUARTILE, QrCode.Ecc.HIGH]) { // From low to high
                if (boostEcl && dataUsedBits <= QrCode.getNumDataCodewords(version, newEcl) * 8)
                    ecl = newEcl;
            }
            // Concatenate all segments to create the data bit string
            let bb = [];
            for (const seg of segs) {
                appendBits(seg.mode.modeBits, 4, bb);
                appendBits(seg.numChars, seg.mode.numCharCountBits(version), bb);
                for (const b of seg.getData())
                    bb.push(b);
            }
            assert(bb.length == dataUsedBits);
            // Add terminator and pad up to a byte if applicable
            const dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
            assert(bb.length <= dataCapacityBits);
            appendBits(0, Math.min(4, dataCapacityBits - bb.length), bb);
            appendBits(0, (8 - bb.length % 8) % 8, bb);
            assert(bb.length % 8 == 0);
            // Pad with alternating bytes until data capacity is reached
            for (let padByte = 0xEC; bb.length < dataCapacityBits; padByte ^= 0xEC ^ 0x11)
                appendBits(padByte, 8, bb);
            // Pack bits into bytes in big endian
            let dataCodewords = [];
            while (dataCodewords.length * 8 < bb.length)
                dataCodewords.push(0);
            bb.forEach((b, i) => dataCodewords[i >>> 3] |= b << (7 - (i & 7)));
            // Create the QR Code object
            return new QrCode(version, ecl, dataCodewords, mask);
        }
        /*-- Accessor methods --*/
        // Returns the color of the module (pixel) at the given coordinates, which is false
        // for light or true for dark. The top left corner has the coordinates (x=0, y=0).
        // If the given coordinates are out of bounds, then false (light) is returned.
        getModule(x, y) {
            return 0 <= x && x < this.size && 0 <= y && y < this.size && this.modules[y][x];
        }
        /*-- Private helper methods for constructor: Drawing function modules --*/
        // Reads this object's version field, and draws and marks all function modules.
        drawFunctionPatterns() {
            // Draw horizontal and vertical timing patterns
            for (let i = 0; i < this.size; i++) {
                this.setFunctionModule(6, i, i % 2 == 0);
                this.setFunctionModule(i, 6, i % 2 == 0);
            }
            // Draw 3 finder patterns (all corners except bottom right; overwrites some timing modules)
            this.drawFinderPattern(3, 3);
            this.drawFinderPattern(this.size - 4, 3);
            this.drawFinderPattern(3, this.size - 4);
            // Draw numerous alignment patterns
            const alignPatPos = this.getAlignmentPatternPositions();
            const numAlign = alignPatPos.length;
            for (let i = 0; i < numAlign; i++) {
                for (let j = 0; j < numAlign; j++) {
                    // Don't draw on the three finder corners
                    if (!(i == 0 && j == 0 || i == 0 && j == numAlign - 1 || i == numAlign - 1 && j == 0))
                        this.drawAlignmentPattern(alignPatPos[i], alignPatPos[j]);
                }
            }
            // Draw configuration data
            this.drawFormatBits(0); // Dummy mask value; overwritten later in the constructor
            this.drawVersion();
        }
        // Draws two copies of the format bits (with its own error correction code)
        // based on the given mask and this object's error correction level field.
        drawFormatBits(mask) {
            // Calculate error correction code and pack bits
            const data = this.errorCorrectionLevel.formatBits << 3 | mask; // errCorrLvl is uint2, mask is uint3
            let rem = data;
            for (let i = 0; i < 10; i++)
                rem = (rem << 1) ^ ((rem >>> 9) * 0x537);
            const bits = (data << 10 | rem) ^ 0x5412; // uint15
            assert(bits >>> 15 == 0);
            // Draw first copy
            for (let i = 0; i <= 5; i++)
                this.setFunctionModule(8, i, getBit(bits, i));
            this.setFunctionModule(8, 7, getBit(bits, 6));
            this.setFunctionModule(8, 8, getBit(bits, 7));
            this.setFunctionModule(7, 8, getBit(bits, 8));
            for (let i = 9; i < 15; i++)
                this.setFunctionModule(14 - i, 8, getBit(bits, i));
            // Draw second copy
            for (let i = 0; i < 8; i++)
                this.setFunctionModule(this.size - 1 - i, 8, getBit(bits, i));
            for (let i = 8; i < 15; i++)
                this.setFunctionModule(8, this.size - 15 + i, getBit(bits, i));
            this.setFunctionModule(8, this.size - 8, true); // Always dark
        }
        // Draws two copies of the version bits (with its own error correction code),
        // based on this object's version field, iff 7 <= version <= 40.
        drawVersion() {
            if (this.version < 7)
                return;
            // Calculate error correction code and pack bits
            let rem = this.version; // version is uint6, in the range [7, 40]
            for (let i = 0; i < 12; i++)
                rem = (rem << 1) ^ ((rem >>> 11) * 0x1F25);
            const bits = this.version << 12 | rem; // uint18
            assert(bits >>> 18 == 0);
            // Draw two copies
            for (let i = 0; i < 18; i++) {
                const color = getBit(bits, i);
                const a = this.size - 11 + i % 3;
                const b = Math.floor(i / 3);
                this.setFunctionModule(a, b, color);

                    result.push(str.charCodeAt(i));
                else {

    /*-- Constants --*/
    // Describes precisely all strings that are encodable in numeric mode.

/* ============================================================
   VERIFYCAM  —  main application
   ============================================================ */

// ── App state ──────────────────────────────────────────────
var CFG = { SECRET_KEY:'DEFAULT_KEY', CLIENT_ID:'CLIENT_001', VER:'1.0' };
var gpsCoords  = null;         // {lat, lon}
var gpsStatus  = 'searching';  // 'searching' | 'active' | 'lost'
var gpsWatch   = null;
var camStream  = null;
var camFacing  = 'environment';
var torchOn    = false;
var torchOK    = false;
var pwaEvent   = null;

// ── DOM shortcuts ───────────────────────────────────────────
function g(id){ return document.getElementById(id); }
function p2(n){ return String(n).padStart(2,'0'); }

// ── Loading screen ──────────────────────────────────────────
function setStep(t){ g('load-step').textContent = t; }

// ── Error screen ────────────────────────────────────────────
function showError(icon, head, body){
  g('scr-load').style.display = 'none';
  g('scr-cam').style.display  = 'none';
  g('scr-err').style.display  = 'flex';
  g('err-icon').textContent = icon;
  g('err-head').textContent = head;
  g('err-body').textContent = body;
}
function retryInit(){
  g('scr-err').style.display  = 'none';
  g('scr-load').style.display = 'flex';
  appInit();
}

// ── Toast ───────────────────────────────────────────────────
function toast(msg, ms){
  var t = g('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, ms || 2400);
}

// ── Clock ───────────────────────────────────────────────────
function tickClock(){
  var d = new Date();
  g('clock').textContent =
    p2(d.getHours()) + ':' + p2(d.getMinutes()) + ':' + p2(d.getSeconds());
}
function nowISO(){
  var d = new Date();
  return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+
         'T'+p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());
}

// ── Transliteration ─────────────────────────────────────────
var TR = {
  'А':'A','Б':'B','В':'V','Г':'G','Д':'D','Е':'E','Ё':'YO','Ж':'ZH','З':'Z',
  'И':'I','Й':'Y','К':'K','Л':'L','М':'M','Н':'N','О':'O','П':'P','Р':'R',
  'С':'S','Т':'T','У':'U','Ф':'F','Х':'KH','Ц':'TS','Ч':'CH','Ш':'SH',
  'Щ':'SCH','Ъ':'','Ы':'Y','Ь':'','Э':'E','Ю':'YU','Я':'YA',
  'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z',
  'и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
  'с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh',
  'щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
};
function translit(s){
  return s.split('').map(function(c){ return TR[c]!==undefined ? TR[c] : c; }).join('');
}

// ── HMAC-SHA256 ─────────────────────────────────────────────
async function hmac(key, msg){
  var enc = new TextEncoder();
  var k = await crypto.subtle.importKey(
    'raw', enc.encode(key), {name:'HMAC',hash:'SHA-256'}, false, ['sign']
  );
  var s = await crypto.subtle.sign('HMAC', k, enc.encode(msg));
  return Array.from(new Uint8Array(s))
    .map(function(b){ return b.toString(16).padStart(2,'0'); })
    .join('').toUpperCase().slice(0,16);
}

// ── GPS ─────────────────────────────────────────────────────
function applyGPS(){
  var badge   = g('gps-badge');
  var shutter = g('shutter');
  var modal   = g('gps-modal');

  if(gpsStatus === 'active' && gpsCoords){
    badge.className = 'active';
    badge.textContent = '⌖ ' + gpsCoords.lat.toFixed(5) + ' ' + gpsCoords.lon.toFixed(5);
    shutter.disabled = false;
    shutter.classList.remove('no-gps');
    modal.classList.remove('on');
  } else if(gpsStatus === 'lost'){
    badge.className = 'lost';
    badge.textContent = '⌖ GPS потерян';
    shutter.disabled = true;
    shutter.classList.add('no-gps');
    modal.classList.add('on');
  } else {
    badge.className = 'searching';
    badge.textContent = '⌖ GPS…';
    shutter.disabled = true;
    shutter.classList.add('no-gps');
    modal.classList.add('on');
  }
}

function startGPS(){
  if(!navigator.geolocation){
    showError('📍','GPS недоступен','Ваш браузер не поддерживает геолокацию.');
    return;
  }
  gpsStatus = 'searching';
  applyGPS();

  // First fix — fast
  navigator.geolocation.getCurrentPosition(
    function(p){
      gpsCoords = { lat:p.coords.latitude, lon:p.coords.longitude };
      gpsStatus = 'active';
      applyGPS();
    },
    function(){},
    { enableHighAccuracy:true, timeout:11000, maximumAge:0 }
  );

  // Continuous watch
  gpsWatch = navigator.geolocation.watchPosition(
    function(p){
      gpsCoords = { lat:p.coords.latitude, lon:p.coords.longitude };
      gpsStatus = 'active';
      applyGPS();
    },
    function(){
      gpsStatus = 'lost';
      applyGPS();
    },
    { enableHighAccuracy:true, maximumAge:5000 }
  );
}

function retryGPS(){
  if(gpsWatch !== null){ navigator.geolocation.clearWatch(gpsWatch); gpsWatch = null; }
  gpsStatus = 'searching';
  applyGPS();
  startGPS();
}

// ── Camera ──────────────────────────────────────────────────
async function startCam(){
  try{
    if(camStream) camStream.getTracks().forEach(function(t){ t.stop(); });

    camStream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode: camFacing,
        width:  { ideal:4096 },
        height: { ideal:2160 }
      },
      audio: false
    });

    var vid = g('video');
    vid.srcObject = camStream;

    // Wait for video to be ready — three ways + fallback timeout
    await new Promise(function(resolve){
      var done = function(){ resolve(); };
      vid.addEventListener('loadedmetadata', done, { once:true });
      vid.addEventListener('playing',        done, { once:true });
      setTimeout(done, 5000);
    });
    await vid.play().catch(function(){});

    setupCapabilities();

  } catch(e){
    showError('📷','Нет доступа к камере',
      'Разрешите доступ к камере:\n\n' +
      'Chrome: адресная строка → 🔒 → Камера → Разрешить\n\n' +
      'Затем нажмите «Повторить»'
    );
  }
}

function setupCapabilities(){
  var track = camStream && camStream.getVideoTracks()[0];
  if(!track) return;

  var caps = track.getCapabilities ? track.getCapabilities() : {};

  // Torch
  torchOK = !!caps.torch;
  var tb = g('btn-torch');
  tb.disabled = !torchOK;
  if(!torchOK) tb.title = 'Вспышка не поддерживается';

  // Zoom
  var zr = g('zoom-row');
  if(caps.zoom){
    zr.classList.add('on');
    var sl = g('zoom-range');
    sl.min   = caps.zoom.min  || 1;
    sl.max   = caps.zoom.max  || 5;
    sl.step  = caps.zoom.step || 0.1;
    sl.value = sl.min;
    g('zoom-lbl').textContent = parseFloat(sl.min).toFixed(1)+'×';
    sl.oninput = async function(){
      var v = parseFloat(sl.value);
      g('zoom-lbl').textContent = v.toFixed(1)+'×';
      try{ await track.applyConstraints({ advanced:[{zoom:v}] }); } catch(e){}
    };
  } else {
    zr.classList.remove('on');
  }
}

function toggleTorch(){
  if(!torchOK){ toast('⚡ Вспышка не поддерживается'); return; }
  var track = camStream.getVideoTracks()[0];
  torchOn = !torchOn;
  track.applyConstraints({ advanced:[{torch:torchOn}] }).catch(function(){});
  g('btn-torch').classList.toggle('torch-on', torchOn);
}

function flipCam(){
  camFacing = camFacing === 'environment' ? 'user' : 'environment';
  torchOn   = false;
  g('btn-torch').classList.remove('torch-on');
  startCam();
}

// ── roundRect polyfill ──────────────────────────────────────
function rRect(ctx, x, y, w, h, r){
  if(typeof ctx.roundRect === 'function'){
    ctx.beginPath(); ctx.roundRect(x, y, w, h, r);
  } else {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);   ctx.arcTo(x+w, y,   x+w, y+r,   r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h);   ctx.arcTo(x,   y+h, x,   y+h-r, r);
    ctx.lineTo(x,   y+r);   ctx.arcTo(x,   y,   x+r, y,     r);
    ctx.closePath();
  }
}

// ── Paint QR onto canvas ────────────────────────────────────
//
//  ПРАВИЛО: QR всегда в нижнем левом углу canvas.
//  canvas снимается прямо с видеопотока — его координаты
//  совпадают с пикселями фото. Никаких трансформаций canvas
//  после drawImage не делаем — кнопки UI остаются на месте.
//
function paintQR(ctx, qrText, CW, CH, dateStr, gpsStr, sig){

  // 1 — Получаем класс QrCode
  var QC;
  try { QC = qrcodegen.QrCode; if(!QC) throw 0; }
  catch(e){
    console.error('[QR] lib unavailable');
    _qrErr(ctx, CW, CH, 'lib unavailable');
    return;
  }

  // 2 — Кодируем
  var qr;
  try { qr = QC.encodeText(qrText, QC.Ecc.MEDIUM); }
  catch(e){
    console.error('[QR] encode failed:', e.message, '| text:', qrText);
    _qrErr(ctx, CW, CH, 'encode: ' + e.message.slice(0,20));
    return;
  }

  // 3 — Размеры карточки
  var S   = Math.min(CW, CH);          // short side
  var QSZ = Math.max(130, Math.round(S * 0.185)); // QR square px
  var MG  = Math.round(S * 0.024);     // отступ от края
  var PAD = Math.round(QSZ * 0.07);    // padding внутри карточки
  var LH  = Math.max(11, Math.round(S * 0.013));  // высота строки
  var CRD_W = QSZ + PAD*2;
  var CRD_H = QSZ + PAD*2 + LH*3 + Math.round(LH*0.7);

  // Нижний левый угол фото в координатах canvas:
  var BX = MG;              // left edge
  var BY = CH - CRD_H - MG; // top edge of card

  var QX = BX + PAD;        // QR left
  var QY = BY + PAD;        // QR top
  var CELL = QSZ / qr.size; // one module

  // 4 — Тень
  ctx.save();
  ctx.shadowColor   = 'rgba(0,0,0,.6)';
  ctx.shadowBlur    = 22;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 5;
  ctx.fillStyle = '#fff';
  rRect(ctx, BX, BY, CRD_W, CRD_H, 10);
  ctx.fill();
  ctx.restore();

  // 5 — Белая карточка (без тени)
  ctx.fillStyle = '#ffffff';
  rRect(ctx, BX, BY, CRD_W, CRD_H, 10);
  ctx.fill();

  // 6 — Модули QR
  ctx.fillStyle = '#111111';
  for(var row = 0; row < qr.size; row++){
    for(var col = 0; col < qr.size; col++){
      if(qr.getModule(col, row)){
        ctx.fillRect(
          Math.round(QX + col * CELL),
          Math.round(QY + row * CELL),
          Math.max(1, Math.ceil(CELL)),
          Math.max(1, Math.ceil(CELL))
        );
      }
    }
  }

  // 7 — Логотип в центре QR: белый квадрат → тёмный фон → зелёный V
  var LS = Math.round(QSZ * 0.22);
  var LX = Math.round(QX + QSZ/2 - LS/2);
  var LY = Math.round(QY + QSZ/2 - LS/2);
  ctx.fillStyle = '#fff'; ctx.fillRect(LX-4, LY-4, LS+8, LS+8);
  ctx.fillStyle = '#09091a'; ctx.fillRect(LX, LY, LS, LS);
  var FSZ = Math.round(LS * 0.62);
  ctx.font = 'bold ' + FSZ + 'px monospace';
  ctx.fillStyle    = '#00ff88';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('V', LX + LS/2, LY + LS/2 + 1);

  // 8 — Подпись ниже QR
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle    = '#333';
  ctx.font = LH + 'px monospace';
  var TY = BY + PAD + QSZ + Math.round(LH * 0.3);
  ctx.fillText(dateStr,      QX, TY);
  ctx.fillText(gpsStr,       QX, TY + LH + 2);
  ctx.fillText('SIG:' + sig, QX, TY + (LH+2)*2);

  console.log('[ВК] QR ' + qr.size + 'x' + qr.size +
              ' v' + qr.version + ' @ (' + BX + ',' + BY + ')' +
              ' canvas ' + CW + 'x' + CH);
}

// Видимая ошибка на фото, если что-то пошло не так
function _qrErr(ctx, CW, CH, msg){
  ctx.fillStyle = 'rgba(200,0,50,.92)';
  ctx.fillRect(10, CH-88, 300, 78);
  ctx.fillStyle    = '#fff';
  ctx.font         = 'bold 13px monospace';
  ctx.textBaseline = 'top';
  ctx.textAlign    = 'left';
  ctx.fillText('QR ERROR:', 18, CH-78);
  ctx.fillText(msg, 18, CH-58);
}

// ── Shoot ───────────────────────────────────────────────────
async function shoot(){
  if(gpsStatus !== 'active' || !gpsCoords){
    toast('❌ Нет GPS — съёмка невозможна');
    return;
  }

  // Flash
  var fl = g('flash');
  fl.classList.add('pop');
  setTimeout(function(){ fl.classList.remove('pop'); }, 130);

  var vid = g('video');
  var cv  = g('cv');
  var VW  = vid.videoWidth  || 1920;
  var VH  = vid.videoHeight || 1080;

  cv.width  = VW;
  cv.height = VH;
  var ctx = cv.getContext('2d');

  // Снимаем кадр с видео
  // Фронтальная камера — зеркалим горизонтально (убираем selfie-зеркало)
  if(camFacing === 'user'){
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(vid, -VW, 0, VW, VH);
    ctx.restore();
  } else {
    ctx.drawImage(vid, 0, 0, VW, VH);
  }
  // После drawImage ctx никак не трансформируем.
  // Координаты canvas: (0,0) = верхний левый угол фото.
  // QR рисуем в bottom-left: (margin, VH - cardH - margin).

  // Формируем данные
  var dateStr = nowISO();
  var gpsStr  = gpsCoords.lat.toFixed(6) + ',' + gpsCoords.lon.toFixed(6);
  var id      = translit(CFG.CLIENT_ID).toUpperCase().replace(/[^A-Z0-9_-]/g, '_');
  var payload = id + '|' + dateStr + '|' + gpsStr;

  var sig = 'NOSIG';
  try { sig = await hmac(CFG.SECRET_KEY, payload); }
  catch(e){ console.error('[ВК] HMAC error:', e); }

  var qrText = id + '|' + dateStr + '|' + gpsStr + '|' + sig + '|' + CFG.VER;
  console.log('[ВК] qrText:', qrText, 'len:', qrText.length);

  // Рисуем QR на canvas ДО toBlob
  paintQR(ctx, qrText, VW, VH, dateStr, gpsStr, sig);

  // Сохраняем JPEG
  var now = new Date();
  cv.toBlob(function(blob){
    if(!blob){ toast('❌ Ошибка создания файла'); return; }

    var fn = 'VERIFY_' + CFG.CLIENT_ID + '_' +
             now.getFullYear() + p2(now.getMonth()+1) + p2(now.getDate()) +
             '_' + p2(now.getHours()) + p2(now.getMinutes()) + p2(now.getSeconds()) + '.jpg';

    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if(isIOS){
      window.open(URL.createObjectURL(blob), '_blank');
      toast('📱 Удержите фото → Добавить в Фото', 4000);
    } else {
      var url = URL.createObjectURL(blob);
      var a   = document.createElement('a');
      a.href  = url;
      a.download = fn;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('✓ Сохранено: ' + fn);
    }
  }, 'image/jpeg', 0.95);
}

// ── PWA Install ─────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  pwaEvent = e;
  g('btn-install').classList.add('on');
});

async function doInstall(){
  if(!pwaEvent){ toast('Нажмите ⋮ → Добавить на главный экран'); return; }
  pwaEvent.prompt();
  await pwaEvent.userChoice;
  pwaEvent = null;
  g('btn-install').classList.remove('on');
}

// ── App Init ────────────────────────────────────────────────
async function appInit(){
  try{
    setStep('Загрузка конфигурации…');

    var urlId = new URLSearchParams(location.search).get('id');

    try{
      var r = await fetch('config.json', { cache:'no-cache' });
      if(r.ok) Object.assign(CFG, await r.json());
    } catch(e){ /* defaults */ }

    if(urlId) CFG.CLIENT_ID = urlId;
    g('cid-label').textContent = CFG.CLIENT_ID;

    // Smoke-test QR lib
    try{
      var _t = qrcodegen.QrCode.encodeText('SMOKE_TEST', qrcodegen.QrCode.Ecc.MEDIUM);
      console.log('[ВК] QR lib OK — smoke QR size:', _t.size);
    } catch(e){
      console.error('[ВК] QR lib SMOKE TEST FAILED:', e);
    }

    setStep('Открываем камеру…');
    await startCam();

    setStep('Ожидаем GPS…');
    startGPS();

    // Show camera screen
    g('scr-load').style.display = 'none';
    g('scr-cam').style.display  = 'block';

    // Clock
    tickClock();
    setInterval(tickClock, 1000);

    // Register service worker
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }

  } catch(e){
    showError('⚠️', 'Ошибка запуска', e.message || 'Обновите страницу');
  }
}

document.addEventListener('DOMContentLoaded', appInit);
