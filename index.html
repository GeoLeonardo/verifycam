<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ВерифиКам">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>ВерифиКам</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;background:#000;font-family:-apple-system,sans-serif;overflow:hidden;color:#fff}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hidden{display:none!important}

/* ── СТАРТ ── */
#s-start{background:linear-gradient(170deg,#0d0d14,#000);padding:32px 24px;gap:18px}
.logo{width:88px;height:88px;border-radius:20px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 8px 32px rgba(0,0,0,0.6);flex-shrink:0}
.app-name{font-size:28px;font-weight:700;letter-spacing:-0.02em}
.app-sub{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;line-height:1.6;max-width:260px}
.cid-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 18px;font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:0.06em}
.cid-box span{color:#f5c518;font-weight:600}
.perms{width:100%;max-width:300px;display:flex;flex-direction:column;gap:8px}
.prow{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:11px 14px}
.picon{font-size:20px;flex-shrink:0}
.pinfo{display:flex;flex-direction:column;gap:1px}
.ptitle{font-size:13px;font-weight:600;color:rgba(255,255,255,0.85)}
.pdesc{font-size:11px;color:rgba(255,255,255,0.4)}
.pstate{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:99px;flex-shrink:0}
.pstate.wait{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4)}
.pstate.ok{background:rgba(74,222,128,0.15);color:#4ade80}
.pstate.no{background:rgba(255,100,100,0.15);color:#f87171}
.btn-main{width:100%;max-width:300px;padding:18px;border-radius:14px;background:#f5c518;border:none;color:#000;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .12s,transform .09s}
.btn-main:active{background:#d4a800;transform:scale(0.97)}
.btn-ghost{background:none;border:none;color:rgba(255,255,255,0.35);font-size:13px;cursor:pointer;padding:8px;margin-top:-8px}
.ios-hint{display:none;width:100%;max-width:300px;background:rgba(245,197,24,0.08);border:1px solid rgba(245,197,24,0.25);border-radius:12px;padding:14px;font-size:12px;color:rgba(255,255,255,0.6);line-height:1.8}
.ios-hint b{color:#f5c518}

/* ── КАМЕРА ── */
#s-cam{background:#000;justify-content:flex-start;align-items:stretch}
.vf{flex:1;position:relative;overflow:hidden;background:#0a0a0a}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.grid{position:absolute;inset:0;z-index:2;pointer-events:none;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr}
.gv{border-left:1px solid rgba(255,255,255,0.08)}
.gh{border-top:1px solid rgba(255,255,255,0.08)}
.cr{position:absolute;width:20px;height:20px;z-index:3}
.cr-tl{top:12px;left:12px;border-top:2px solid rgba(255,255,255,0.65);border-left:2px solid rgba(255,255,255,0.65)}
.cr-tr{top:12px;right:12px;border-top:2px solid rgba(255,255,255,0.65);border-right:2px solid rgba(255,255,255,0.65)}
.cr-bl{bottom:12px;left:12px;border-bottom:2px solid rgba(255,255,255,0.65);border-left:2px solid rgba(255,255,255,0.65)}
.cr-br{bottom:12px;right:12px;border-bottom:2px solid rgba(255,255,255,0.65);border-right:2px solid rgba(255,255,255,0.65)}
#fr{position:absolute;width:64px;height:64px;border:1.5px solid #f5c518;border-radius:2px;pointer-events:none;opacity:0;transform:translate(-50%,-50%) scale(1.4);transition:opacity .1s,transform .16s;z-index:4}
#fr.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.hud{position:absolute;top:0;left:0;right:0;padding:max(env(safe-area-inset-top),14px) 14px 0;display:flex;align-items:center;justify-content:space-between;z-index:5;pointer-events:none}
.htime{font-size:13px;font-weight:600;color:rgba(255,255,255,0.9);letter-spacing:.05em;text-shadow:0 1px 8px #000;font-variant-numeric:tabular-nums}
.gbadge{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.07em;backdrop-filter:blur(8px);background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.13);color:rgba(255,255,255,0.5);transition:all .4s}
.gbadge.ok{color:#4ade80;border-color:rgba(74,222,128,0.4);background:rgba(0,30,15,0.65)}
.gbadge.srch{color:#fbbf24;border-color:rgba(251,191,36,0.35);animation:gbl 1.1s ease infinite}
@keyframes gbl{0%,100%{opacity:1}50%{opacity:.3}}
#btn-flip{position:absolute;top:max(env(safe-area-inset-top),14px);left:50%;transform:translateX(-50%);z-index:5;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:5px 14px;color:rgba(255,255,255,0.75);font-size:12px;letter-spacing:.05em;cursor:pointer;backdrop-filter:blur(8px)}
#btn-flip:active{background:rgba(255,255,255,0.2)}
.id-badge{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:4px 14px;color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:.07em;backdrop-filter:blur(8px);white-space:nowrap;pointer-events:none}
.cam-bar{background:#000;flex-shrink:0;padding:14px 0 max(28px,env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:center}
.shutter{width:80px;height:80px;border-radius:50%;border:3px solid rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .08s}
.shutter:active{transform:scale(0.88)}
.disc{width:65px;height:65px;border-radius:50%;background:#fff;transition:background .08s,transform .08s}
.shutter:active .disc{background:#ccc;transform:scale(0.9)}
.shutter.busy .disc{background:#f5c518;animation:sp .5s ease infinite}
@keyframes sp{0%,100%{transform:scale(1)}50%{transform:scale(0.87)}}

/* ── ПРЕВЬЮ ── */
#s-preview{background:#000;justify-content:flex-start;align-items:stretch}
.pvwrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000}
#pvimg{max-width:100%;max-height:100%;object-fit:contain}
.pvbar{background:#0d0d0d;flex-shrink:0;border-top:1px solid rgba(255,255,255,0.07);padding:10px 14px;display:flex;align-items:center;gap:8px}
.pvdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;animation:bl 1.6s ease infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.1}}
.pvdot.ok{background:#4ade80;box-shadow:0 0 7px #4ade80}
.pvdot.warn{background:#fbbf24;box-shadow:0 0 7px #fbbf24}
.pvtxt{font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:.04em}
.pvsig{font-size:10px;color:rgba(255,255,255,0.22);font-family:monospace;margin-left:auto}
.pvactions{background:#111;flex-shrink:0;padding:12px 14px max(32px,env(safe-area-inset-bottom));display:flex;gap:10px}
.btn-retake{flex:1;padding:15px;border-radius:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.btn-retake:active{background:rgba(255,255,255,0.14)}
.btn-save{flex:2;padding:15px;border-radius:12px;background:#f5c518;border:none;color:#000;font-size:15px;font-weight:700;cursor:pointer}
.btn-save:active{background:#d4a800}

/* ── ОБЩЕЕ ── */
.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:99;transition:opacity .05s}
.flash.go{opacity:1}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(10,10,10,0.97);color:#fff;font-size:13px;font-weight:500;padding:12px 22px;border-radius:99px;opacity:0;pointer-events:none;z-index:200;transition:opacity .2s,transform .2s;white-space:nowrap;border:1px solid rgba(255,255,255,0.09);backdrop-filter:blur(16px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:rgba(248,113,113,0.4)}
#loader{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loader.show{display:flex}
.spin{width:46px;height:46px;border-radius:50%;border:3px solid rgba(255,255,255,0.1);border-top-color:#f5c518;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#ltxt{font-size:12px;color:rgba(255,255,255,0.55);letter-spacing:.08em}
</style>
</head>

function translit(s){ return s.split('').map(c=>TR[c]!==undefined?TR[c]:c).join(''); }

let stream=null, facingMode='environment';
let gps=null, blob=null, meta=null, camOk=false;
const video=document.getElementById('video');
const shutter=document.getElementById('shutter');

// INIT
document.getElementById('show-id').textContent = CFG.CLIENT_ID;
document.getElementById('id-badge').textContent = 'ID: '+CFG.CLIENT_ID;
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!navigator.standalone)
  document.getElementById('ios-hint').style.display='block';
setInterval(()=>{const n=new Date(),el=document.getElementById('htime');if(el)el.textContent=p2(n.getHours())+':'+p2(n.getMinutes())+':'+p2(n.getSeconds());},1000);

// ── СТАРТ ──
async function onStart(){
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-start').textContent='Запуск...';
  await startCam();
  startGPS();
  show('s-cam');
}

// ── КАМЕРА ──
async function startCam(){
  const pEl=document.getElementById('p-cam');
  try{
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facingMode},width:{ideal:1920},height:{ideal:1440}},audio:false
    });
    video.srcObject=stream;
    video.setAttribute('playsinline','');
    video.setAttribute('muted','');
    await video.play();
    camOk=true;
    pEl.textContent='Разрешено';pEl.className='pstate ok';
    document.getElementById('btn-flip').style.display='block';
  }catch(err){
    camOk=false;pEl.textContent='Отклонено';pEl.className='pstate no';
    toast('Разрешите доступ к камере: нажмите 🔒 в адресной строке','err');
  }
}
async function flipCam(){facingMode=facingMode==='environment'?'user':'environment';camOk=false;await startCam();}

// ── GPS ──
function startGPS(){
  const badge=document.getElementById('gbadge'),pEl=document.getElementById('p-gps');
  if(!navigator.geolocation){badge.textContent='GPS —';badge.className='gbadge';pEl.textContent='Нет';pEl.className='pstate no';return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{gps={lat:pos.coords.latitude.toFixed(5),lon:pos.coords.longitude.toFixed(5)};badge.textContent='⌖ GPS';badge.className='gbadge ok';pEl.textContent='Разрешено';pEl.className='pstate ok';},
    ()=>{badge.textContent='GPS —';badge.className='gbadge';pEl.textContent='Отклонено';pEl.className='pstate no';},
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

// ── ТАП ФОКУС ──
function onTap(e){
  const r=document.getElementById('fr'),rc=document.getElementById('vf').getBoundingClientRect();
  r.style.left=(e.clientX-rc.left)+'px';r.style.top=(e.clientY-rc.top)+'px';
  r.classList.remove('show');void r.offsetWidth;r.classList.add('show');
  setTimeout(()=>r.classList.remove('show'),850);
}

// ══════════════════════════════════════
//  СЪЁМКА
// ══════════════════════════════════════
async function shoot(){
  if(!camOk){toast('Камера не готова','err');return;}
  const fl=document.getElementById('flash');
  fl.classList.add('go');setTimeout(()=>fl.classList.remove('go'),140);
  shutter.classList.add('busy');
  showL('СНИМОК...');
  try{
    const cv=document.getElementById('cv'),cx=cv.getContext('2d');
    const W=video.videoWidth||1280,H=video.videoHeight||960;
    cv.width=W;cv.height=H;

    // Фронтальная камера — убираем зеркало
    if(facingMode==='user'){
      cx.save();cx.translate(W,0);cx.scale(-1,1);cx.drawImage(video,0,0,W,H);cx.restore();
    }else{
      cx.drawImage(video,0,0,W,H);
    }

    const gpsStr = gps ? gps.lat+','+gps.lon : 'NO_GPS';
    const dateStr = isoNow(new Date());

    // ══════════════════════════════════════════════════════
    //  КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ:
    //  Транслитерируем CLIENT_ID → чистый ASCII
    //  Подписываем ТРАНСЛИТОМ — то же что записываем в QR
    //  Чекер читает QR, подписывает тем же = совпадает!
    // ══════════════════════════════════════════════════════
    const clientIdAscii = translit(CFG.CLIENT_ID);

    // payload = транслит_ID|дата|gps
    const payload = clientIdAscii+'|'+dateStr+'|'+gpsStr;
    const hmac    = await hmacSign(CFG.SECRET_KEY, payload);

    // QR строка — только ASCII, без кириллицы
    const qrTxt = clientIdAscii+'|'+dateStr+'|'+gpsStr+'|'+hmac+'|'+CFG.VER;

    meta = {date:dateStr, gps:gpsStr, id:CFG.CLIENT_ID, idAscii:clientIdAscii, hmac, ver:CFG.VER};

    showL('QR-КОД...');
    stampQR(cx, W, H, qrTxt, meta);

    cv.toBlob(b=>{
      blob=b;
      document.getElementById('pvimg').src=URL.createObjectURL(b);
      document.getElementById('pvdot').className='pvdot '+(gpsStr!=='NO_GPS'?'ok':'warn');
      document.getElementById('pvtxt').textContent=(gpsStr!=='NO_GPS'?'✓ Верифицировано':'✓ Верифицировано (без GPS)')+' · '+CFG.CLIENT_ID;
      document.getElementById('pvsig').textContent=hmac.slice(0,8)+'…';
      hideL();shutter.classList.remove('busy');
      show('s-preview');
    },'image/jpeg',0.93);

  }catch(err){hideL();shutter.classList.remove('busy');toast('Ошибка: '+err.message,'err');console.error(err);}
}

// ══════════════════════════════════════
//  QR STAMP — НИЖНИЙ ЛЕВЫЙ УГОЛ
// ══════════════════════════════════════
function stampQR(cx, W, H, qrTxt, m){
  const qrSz  = Math.max(Math.round(Math.min(W,H)*0.17), 100);
  const mg    = Math.round(Math.min(W,H)*0.025);
  const pad   = Math.round(qrSz*0.1);
  const fs    = Math.max(Math.round(qrSz*0.09), 11);
  const lh    = fs+6;
  const bW    = qrSz+pad*2;
  const bH    = qrSz+pad*2+lh*3+pad;

  // Фиксированный нижний левый угол — не зависит от поворота
  const bx = mg;
  const by = H - mg - bH;

  // Генерируем QR через наш встроенный генератор
  const cellSz = Math.ceil(qrSz / 25); // ~4px на ячейку
  const qrCanvas = window.makeQR(qrTxt, cellSz);
  const actualSz = qrCanvas.width; // реальный размер может чуть отличаться

  // Тень + белый фон
  cx.shadowColor='rgba(0,0,0,0.55)';cx.shadowBlur=20;cx.shadowOffsetX=2;cx.shadowOffsetY=2;
  cx.fillStyle='rgba(255,255,255,0.97)';
  rrect(cx,bx,by,bW,bH,10);cx.fill();
  cx.shadowColor='transparent';cx.shadowBlur=0;

  // QR — масштабируем в нужный размер
  cx.drawImage(qrCanvas, bx+pad, by+pad, qrSz, qrSz);

  // Текст
  const tx=bx+pad;let ty=by+pad+qrSz+fs+4;
  cx.textAlign='left';
  cx.fillStyle='#000';cx.font='bold '+fs+'px monospace';
  cx.fillText(m.date.replace('T',' ').slice(0,16),tx,ty);ty+=lh;
  cx.fillStyle='#333';cx.font=fs+'px monospace';
  cx.fillText(m.gps==='NO_GPS'?'GPS: —':m.gps.replace(',',', '),tx,ty);ty+=lh;
  cx.fillStyle='#888';
  cx.fillText('SIG: '+m.hmac.slice(0,12)+'…',tx,ty);
}

function rrect(cx,x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
}

// ── НАВИГАЦИЯ ──
function retake(){show('s-cam');blob=null;meta=null;document.getElementById('pvimg').src='';}
function show(id){['s-start','s-cam','s-preview'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}

// ── СОХРАНЕНИЕ ──
function savePhoto(){
  if(!blob)return;
  const n=new Date();
  const fn='VERIFY_'+CFG.CLIENT_ID+'_'+n.getFullYear()+p2(n.getMonth()+1)+p2(n.getDate())+'_'+p2(n.getHours())+p2(n.getMinutes())+p2(n.getSeconds())+'.jpg';
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('📸 Сохранено! Отправьте файл в мессенджере');
}

// ── HMAC-SHA256 ──
async function hmacSign(key,msg){
  const enc=new TextEncoder();
  const k=await crypto.subtle.importKey('raw',enc.encode(key),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const s=await crypto.subtle.sign('HMAC',k,enc.encode(msg));
  return Array.from(new Uint8Array(s)).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase().slice(0,16);
}

// ── HELPERS ──
function p2(n){return String(n).padStart(2,'0');}
function isoNow(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+'T'+p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());}
function showL(t){document.getElementById('ltxt').textContent=t;document.getElementById('loader').classList.add('show');}
function hideL(){document.getElementById('loader').classList.remove('show');}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className=type||'';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
