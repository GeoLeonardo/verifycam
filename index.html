<!DOCTYPE html>

<title>ВерифиКам</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;background:#000;font-family:-apple-system,sans-serif;overflow:hidden;color:#fff}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hidden{display:none!important}

/* ── СТАРТ ── */
#s-start{background:linear-gradient(170deg,#0d0d14,#000);padding:28px 20px;gap:14px}
.logo{width:80px;height:80px;border-radius:18px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:38px;flex-shrink:0}
.app-name{font-size:24px;font-weight:700;letter-spacing:-.02em}
.app-sub{font-size:12px;color:rgba(255,255,255,.4);text-align:center;line-height:1.5;max-width:250px}
.cid-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;font-size:11px;color:rgba(255,255,255,.5)}
.cid-box span{color:#f5c518;font-weight:600}
.perms{width:100%;max-width:280px;display:flex;flex-direction:column;gap:7px}
.prow{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:9px 12px}
.picon{font-size:18px;flex-shrink:0}
.ptitle{font-size:12px;font-weight:600;color:rgba(255,255,255,.85)}
.pdesc{font-size:10px;color:rgba(255,255,255,.4)}
.pstate{margin-left:auto;font-size:9px;padding:2px 7px;border-radius:99px;flex-shrink:0}
.pstate.wait{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4)}
.pstate.ok{background:rgba(74,222,128,.15);color:#4ade80}
.pstate.no{background:rgba(255,100,100,.15);color:#f87171}
.btn-main{width:100%;max-width:280px;padding:15px;border-radius:12px;background:#f5c518;border:none;color:#000;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-main:active{background:#d4a800}
.btn-main:disabled{background:rgba(255,255,255,.2);color:rgba(0,0,0,.4)}
.btn-ghost{background:none;border:none;color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;padding:6px;margin-top:-6px}
.ios-hint{display:none;width:100%;max-width:280px;background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.2);border-radius:10px;padding:12px;font-size:11px;color:rgba(255,255,255,.55);line-height:1.7}
.ios-hint b{color:#f5c518}

/* ── КАМЕРА ── */
#s-cam{background:#000;justify-content:flex-start;align-items:stretch}
.vf{flex:1;position:relative;overflow:hidden;background:#0a0a0a}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* Сетка */
.grid{position:absolute;inset:0;z-index:2;pointer-events:none;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr}
.gv{border-left:1px solid rgba(255,255,255,.07)}
.gh{border-top:1px solid rgba(255,255,255,.07)}
.cr{position:absolute;width:20px;height:20px;z-index:3}
.cr-tl{top:12px;left:12px;border-top:2px solid rgba(255,255,255,.6);border-left:2px solid rgba(255,255,255,.6)}
.cr-tr{top:12px;right:12px;border-top:2px solid rgba(255,255,255,.6);border-right:2px solid rgba(255,255,255,.6)}
.cr-bl{bottom:12px;left:12px;border-bottom:2px solid rgba(255,255,255,.6);border-left:2px solid rgba(255,255,255,.6)}
.cr-br{bottom:12px;right:12px;border-bottom:2px solid rgba(255,255,255,.6);border-right:2px solid rgba(255,255,255,.6)}

/* Фокус */
#fr{position:absolute;width:60px;height:60px;border:1.5px solid #f5c518;border-radius:2px;pointer-events:none;opacity:0;transform:translate(-50%,-50%) scale(1.4);transition:opacity .1s,transform .15s;z-index:4}
#fr.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* HUD верх */
.hud{position:absolute;top:0;left:0;right:0;padding:max(env(safe-area-inset-top),12px) 14px 0;display:flex;align-items:center;justify-content:space-between;z-index:5;pointer-events:none}
.htime{font-size:12px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:.05em;text-shadow:0 1px 6px #000;font-variant-numeric:tabular-nums}
.gbadge{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.06em;backdrop-filter:blur(8px);background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5)}
.gbadge.ok{color:#4ade80;border-color:rgba(74,222,128,.4);background:rgba(0,30,15,.65)}
.gbadge.srch{color:#fbbf24;border-color:rgba(251,191,36,.3);animation:gbl 1.1s ease infinite}
@keyframes gbl{0%,100%{opacity:1}50%{opacity:.3}}

/* ── КНОПКИ НА ВИДОИСКАТЕЛЕ ── */
.vf-controls{
  position:absolute;top:max(env(safe-area-inset-top),12px);left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:12px;
  z-index:5;pointer-events:all;
  padding:0 14px;
}
.vf-btn{
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.18);
  border-radius:20px;
  padding:5px 12px;
  color:rgba(255,255,255,.8);
  font-size:12px;
  cursor:pointer;
  backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:5px;
  transition:background .15s;
  white-space:nowrap;
}
.vf-btn:active{background:rgba(255,255,255,.2)}
.vf-btn.active{background:rgba(245,197,24,.25);border-color:rgba(245,197,24,.5);color:#f5c518}

/* Зум слайдер */
.zoom-wrap{
  position:absolute;bottom:16px;left:14px;right:14px;
  z-index:5;
  display:none;
  align-items:center;gap:10px;
}
.zoom-wrap.show{display:flex}
.zoom-label{font-size:10px;color:rgba(255,255,255,.6);white-space:nowrap;min-width:36px;text-align:center}
.zoom-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:3px;border-radius:99px;
  background:rgba(255,255,255,.25);outline:none;cursor:pointer;
}
.zoom-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:#f5c518;cursor:pointer;
  box-shadow:0 0 6px rgba(0,0,0,.5);
}
.zoom-slider::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;
  background:#f5c518;cursor:pointer;border:none;
}

.id-badge{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);z-index:5;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 12px;color:rgba(255,255,255,.4);font-size:10px;letter-spacing:.06em;backdrop-filter:blur(8px);white-space:nowrap;pointer-events:none}

.save-status{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);z-index:5;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);border-radius:99px;padding:4px 14px;font-size:11px;color:#4ade80;letter-spacing:.05em;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.save-status.show{opacity:1}

/* ── НИЖНЯЯ ПАНЕЛЬ ── */
.cam-bar{
  background:#000;flex-shrink:0;
  padding:10px 0 max(24px,env(safe-area-inset-bottom));
  display:flex;align-items:center;justify-content:space-around;
}

/* Кнопка вспышки */
.torch-btn{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:22px;transition:background .15s;
}
.torch-btn:active{background:rgba(255,255,255,.2)}
.torch-btn.on{background:rgba(245,197,24,.2);border-color:rgba(245,197,24,.5)}

/* Кнопка съёмки */
.shutter{width:76px;height:76px;border-radius:50%;border:3px solid rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .08s}
.shutter:active{transform:scale(.88)}
.disc{width:62px;height:62px;border-radius:50%;background:#fff;transition:background .08s,transform .08s}
.shutter:active .disc{background:#ccc;transform:scale(.9)}
.shutter.busy .disc{background:#f5c518;animation:sp .5s ease infinite}
@keyframes sp{0%,100%{transform:scale(1)}50%{transform:scale(.87)}}

/* Кнопка перевернуть */
.flip-btn{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:22px;transition:transform .3s ease;
}
.flip-btn:active{transform:rotate(180deg)}

/* ── ОБЩЕЕ ── */
.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:99;transition:opacity .05s}
.flash.go{opacity:1}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(10,10,10,.97);color:#fff;font-size:13px;font-weight:500;padding:11px 20px;border-radius:99px;opacity:0;pointer-events:none;z-index:200;transition:opacity .2s,transform .2s;white-space:nowrap;border:1px solid rgba(255,255,255,.09)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:rgba(248,113,113,.4)}
#loader{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loader.show{display:flex}
.spin{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.1);border-top-color:#f5c518;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#ltxt{font-size:12px;color:rgba(255,255,255,.55);letter-spacing:.08em}
</style>
</head>

  var tn=1,ecl=EL.M,d=q8(text);
  for(;tn<=40;tn++){var rs=grs(tn,ecl),buf=bb();buf.put(4,4);buf.put(d.len(),lb(4,tn));d.write(buf);var tot=0;for(var i=0;i<rs.length;i++)tot+=rs[i].dc;if(buf.len()<=tot*8)break;}
  var mc=tn*4+17,M=[];
  for(var i=0;i<mc;i++){M[i]=new Array(mc);for(var j=0;j<mc;j++)M[i][j]=null;}
  function probe(r,c){for(var dr=-1;dr<=7;dr++){if(r+dr<0||mc<=r+dr)continue;for(var dc=-1;dc<=7;dc++){if(c+dc<0||mc<=c+dc)continue;M[r+dr][c+dc]=((0<=dr&&dr<=6&&dc==0)||(0<=dr&&dr<=6&&dc==6)||(dr==0&&0<=dc&&dc<=6)||(dr==6&&0<=dc&&dc<=6)||(2<=dr&&dr<=4&&2<=dc&&dc<=4));}}}
  probe(0,0);probe(mc-7,0);probe(0,mc-7);
  var pp=PP[tn-1];for(var i=0;i<pp.length;i++)for(var j=0;j<pp.length;j++){var pr=pp[i],pc=pp[j];if(M[pr][pc]!=null)continue;for(var dr=-2;dr<=2;dr++)for(var dc=-2;dc<=2;dc++)M[pr+dr][pc+dc]=(dr==-2||dr==2||dc==-2||dc==2||dr==0&&dc==0);}
  for(var r=8;r<mc-8;r++)if(M[r][6]==null)M[r][6]=(r%2==0);
  for(var c=8;c<mc-8;c++)if(M[6][c]==null)M[6][c]=(c%2==0);
  if(tn>=7){var bn=btn(tn);for(var i=0;i<18;i++){M[Math.floor(i/3)][i%3+mc-8-3]=((bn>>i)&1)==1;M[i%3+mc-8-3][Math.floor(i/3)]=((bn>>i)&1)==1;}}
  function sti(mask,test){var bi=bti((ecl<<3)|mask);for(var i=0;i<15;i++){var v=(!test&&((bi>>i)&1)==1);if(i<6)M[i][8]=v;else if(i<8)M[i+1][8]=v;else M[mc-15+i][8]=v;}for(var i=0;i<15;i++){var v=(!test&&((bi>>i)&1)==1);if(i<8)M[8][mc-i-1]=v;else if(i<9)M[8][15-i]=v;else M[8][15-i-1]=v;}M[mc-8][8]=!test;}
  function lp(m){var p=0;for(var r=0;r<mc;r++){for(var c=0;c<mc;c++){var sc=0,dk=m[r][c];for(var dr=-1;dr<=1;dr++){if(r+dr<0||mc<=r+dr)continue;for(var dc=-1;dc<=1;dc++){if(c+dc<0||mc<=c+dc)continue;if(dr==0&&dc==0)continue;if(dk==m[r+dr][c+dc])sc++;}}if(sc>5)p+=3+sc-5;}for(var c=0;c<mc-1;c++){var k=0;if(m[r][c])k++;if(r+1<mc&&m[r+1][c])k++;if(m[r][c+1])k++;if(r+1<mc&&m[r+1][c+1])k++;if(k==0||k==4)p+=3;}}var dk=0;for(var c=0;c<mc;c++)for(var r=0;r<mc;r++)if(m[r][c])dk++;p+=Math.abs(100*dk/mc/mc-50)/5*10;return p;}
  function bd2(mask){var rs=grs(tn,ecl),buf=bb(),d2=q8(text);buf.put(4,4);buf.put(d2.len(),lb(4,tn));d2.write(buf);var tot=0;for(var i=0;i<rs.length;i++)tot+=rs[i].dc;if(buf.len()+4<=tot*8)buf.put(0,4);while(buf.len()%8!=0)buf.bit(false);while(buf.len()<tot*8){buf.put(P0,8);if(buf.len()>=tot*8)break;buf.put(P1,8);}var off=0,mD=0,mE=0,dc=[],ec=[];for(var r=0;r<rs.length;r++){var dcn=rs[r].dc,ecn=rs[r].tc-dcn;mD=Math.max(mD,dcn);mE=Math.max(mE,ecn);dc[r]=[];for(var i=0;i<dcn;i++)dc[r][i]=0xff&buf.buf()[off++];var rp=ep(ecn),rw=pl(dc[r],rp.len()-1),mp=rw.mod(rp);ec[r]=[];for(var i=0;i<rp.len()-1;i++){var mi=i+mp.len()-(rp.len()-1);ec[r][i]=(mi>=0)?mp.at(mi):0;}}var tot2=0;for(var i=0;i<rs.length;i++)tot2+=rs[i].tc;var data=new Array(tot2),idx=0;for(var i=0;i<mD;i++)for(var r=0;r<rs.length;r++)if(i<dc[r].length)data[idx++]=dc[r][i];for(var i=0;i<mE;i++)for(var r=0;r<rs.length;r++)if(i<ec[r].length)data[idx++]=ec[r][i];var inc=-1,row=mc-1,bi=7,by=0,fn=mf(mask);for(var col=mc-1;col>0;col-=2){if(col==6)col--;while(true){for(var c=0;c<2;c++){if(M[row][col-c]==null){var dark=false;if(by<data.length)dark=(((data[by])>>>bi)&1)==1;if(fn(row,col-c))dark=!dark;M[row][col-c]=dark;bi--;if(bi==-1){by++;bi=7;}}}row+=inc;if(row<0||mc<=row){row-=inc;inc=-inc;break;}}}}
  var bm=0,bl=0,SM=[];for(var i=0;i<mc;i++)SM[i]=M[i].slice();

  var cv=document.createElement('canvas');cv.width=cv.height=mc*cs;var cx=cv.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,cv.width,cv.height);cx.fillStyle='#000';for(var r=0;r<mc;r++)for(var c=0;c<mc;c++)if(M[r][c])cx.fillRect(c*cs,r*cs,cs,cs);

};
})();
</script>

<script>
// ══════════════════════════════════════
//  ЗАГРУЗКА CONFIG.JSON
// ══════════════════════════════════════
(async function(){
  try{
    const r=await fetch('config.json?_='+Date.now());
    if(r.ok){const j=await r.json();CFG.SECRET_KEY=j.SECRET_KEY||CFG.SECRET_KEY;CFG.VER=j.VER||CFG.VER;const ui=new URLSearchParams(location.search).get('id');CFG.CLIENT_ID=ui||j.CLIENT_ID||CFG.CLIENT_ID;}
  }catch(e){const ui=new URLSearchParams(location.search).get('id');if(ui)CFG.CLIENT_ID=ui;}
  document.getElementById('show-id').textContent=CFG.CLIENT_ID;
  document.getElementById('id-badge').textContent='ID: '+CFG.CLIENT_ID;
  const btn=document.getElementById('btn-start');btn.disabled=false;btn.innerHTML='<span>📷</span> Открыть камеру';
})();

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let stream=null,facingMode='environment',gps=null,camOk=false;
let torchOn=false,torchSupported=false;
let zoomMin=1,zoomMax=1,currentZoom=1;
const video=document.getElementById('video'),shutter=document.getElementById('shutter');

if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!navigator.standalone)
  document.getElementById('ios-hint').style.display='block';
setInterval(()=>{const n=new Date(),el=document.getElementById('htime');if(el)el.textContent=p2(n.getHours())+':'+p2(n.getMinutes())+':'+p2(n.getSeconds());},1000);

// ══════════════════════════════════════
//  СТАРТ
// ══════════════════════════════════════
async function onStart(){
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-start').textContent='Запуск…';
  await startCam();startGPS();show('s-cam');
}

// ══════════════════════════════════════
//  КАМЕРА
// ══════════════════════════════════════
async function startCam(){
  const pEl=document.getElementById('p-cam');
  try{
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;torchOn=false;torchSupported=false;}
    stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:facingMode},
        width:{ideal:1920},height:{ideal:1440},
        // Запрашиваем расширенные возможности
        advanced:[{torch:false}]
      },
      audio:false
    });
    video.srcObject=stream;await video.play();
    camOk=true;pEl.textContent='Разрешено';pEl.className='pstate ok';

    // Проверяем возможности трека
    const track=stream.getVideoTracks()[0];
    if(track){
      const caps=track.getCapabilities();
      // Вспышка
      torchSupported=!!(caps.torch);
      document.getElementById('btn-torch').style.opacity=torchSupported?'1':'0.4';
      document.getElementById('torch-btn').style.opacity=torchSupported?'1':'0.4';
      // Зум
      if(caps.zoom){
        zoomMin=caps.zoom.min||1;
        zoomMax=Math.min(caps.zoom.max||1,10);
        currentZoom=1;
        const slider=document.getElementById('zoom-slider');
        slider.min=zoomMin;slider.max=zoomMax;slider.step=0.1;slider.value=1;
        document.getElementById('btn-zoom-toggle').style.opacity='1';
      }else{
        zoomMax=1;
        document.getElementById('btn-zoom-toggle').style.opacity='0.4';
      }
    }
  }catch(err){
    camOk=false;pEl.textContent='Отклонено';pEl.className='pstate no';
    toast('Разрешите доступ к камере: нажмите 🔒','err');
  }
}

async function flipCam(){
  // Выключаем вспышку перед переключением
  if(torchOn)await setTorch(false);
  facingMode=facingMode==='environment'?'user':'environment';
  camOk=false;await startCam();
}

// ══════════════════════════════════════
//  ВСПЫШКА (TORCH)
// ══════════════════════════════════════
async function setTorch(on){
  if(!stream||!torchSupported)return;
  try{
    const track=stream.getVideoTracks()[0];
    await track.applyConstraints({advanced:[{torch:on}]});
    torchOn=on;
    const btn1=document.getElementById('btn-torch');
    const btn2=document.getElementById('torch-btn');
    if(btn1){btn1.textContent=on?'🔦 Вкл':'🔦 Вспышка';btn1.classList.toggle('active',on);}
    if(btn2){btn2.textContent=on?'💡':'🔦';btn2.classList.toggle('on',on);}
  }catch(e){toast('Вспышка недоступна','err');}
}
async function toggleTorch(){
  if(!torchSupported){toast('Вспышка не поддерживается этой камерой');return;}
  await setTorch(!torchOn);
}

// ══════════════════════════════════════
//  ЗУМ
// ══════════════════════════════════════
function toggleZoom(){
  if(zoomMax<=1){toast('Зум не поддерживается этой камерой');return;}
  const wrap=document.getElementById('zoom-wrap');
  wrap.classList.toggle('show');
  document.getElementById('btn-zoom-toggle').classList.toggle('active',wrap.classList.contains('show'));
}

async function onZoom(val){
  currentZoom=parseFloat(val);
  document.getElementById('zoom-label').textContent=currentZoom.toFixed(1)+'×';
  if(!stream)return;
  try{
    const track=stream.getVideoTracks()[0];
    await track.applyConstraints({advanced:[{zoom:currentZoom}]});
  }catch(e){
    // Некоторые браузеры не поддерживают — молча игнорируем
  }
}

// ══════════════════════════════════════
//  GPS
// ══════════════════════════════════════
function startGPS(){
  const badge=document.getElementById('gbadge'),pEl=document.getElementById('p-gps');
  if(!navigator.geolocation){badge.textContent='GPS —';badge.className='gbadge';pEl.textContent='Нет';pEl.className='pstate no';return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{gps={lat:pos.coords.latitude.toFixed(5),lon:pos.coords.longitude.toFixed(5)};badge.textContent='⌖ GPS';badge.className='gbadge ok';pEl.textContent='Разрешено';pEl.className='pstate ok';},
    ()=>{badge.textContent='GPS —';badge.className='gbadge';pEl.textContent='Отклонено';pEl.className='pstate no';},
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

// ══════════════════════════════════════
//  ТАП → ФОКУС
// ══════════════════════════════════════
function onTap(e){
  // Игнорируем тапы на кнопках управления
  if(e.target.closest('.vf-controls,.zoom-wrap'))return;
  const r=document.getElementById('fr'),rc=document.getElementById('vf').getBoundingClientRect();
  r.style.left=(e.clientX-rc.left)+'px';r.style.top=(e.clientY-rc.top)+'px';
  r.classList.remove('show');void r.offsetWidth;r.classList.add('show');
  setTimeout(()=>r.classList.remove('show'),850);
}

// ══════════════════════════════════════
//  СЪЁМКА
// ══════════════════════════════════════
async function shoot(){
  if(!camOk){toast('Камера не готова','err');return;}
  const fl=document.getElementById('flash');
  fl.classList.add('go');setTimeout(()=>fl.classList.remove('go'),140);
  shutter.classList.add('busy');showL('СНИМОК…');

  // Выключаем вспышку после съёмки
  const wasOn=torchOn;

  try{
    const cv=document.getElementById('cv'),cx=cv.getContext('2d');
    const W=video.videoWidth||1280,H=video.videoHeight||960;
    cv.width=W;cv.height=H;

    // Убираем зеркало фронтальной камеры
    if(facingMode==='user'){cx.save();cx.translate(W,0);cx.scale(-1,1);cx.drawImage(video,0,0,W,H);cx.restore();}
    else cx.drawImage(video,0,0,W,H);

    // Читаем EXIF orientation и нормализуем
    const rawBlob=await new Promise(res=>cv.toBlob(res,'image/jpeg',0.95));
    const orientation=await readExifOri(rawBlob);
    const normCv=normalizeCanvas(cv,orientation);
    const fW=normCv.width,fH=normCv.height;
    const fCx=normCv.getContext('2d');

    // Подпись и QR
    const gpsStr=gps?gps.lat+','+gps.lon:'NO_GPS';
    const dateStr=isoNow(new Date());
    const idA=translit(CFG.CLIENT_ID);
    const payload=idA+'|'+dateStr+'|'+gpsStr;
    const hmac=await hmacSign(CFG.SECRET_KEY,payload);
    const qrTxt=idA+'|'+dateStr+'|'+gpsStr+'|'+hmac+'|'+CFG.VER;

    showL('QR-КОД…');
    stampQR(fCx,fW,fH,qrTxt,dateStr,gpsStr,hmac);

    // Авто-сохранение
    normCv.toBlob(blob=>{
      const n=new Date();
      const fn='VERIFY_'+CFG.CLIENT_ID+'_'+n.getFullYear()+p2(n.getMonth()+1)+p2(n.getDate())+'_'+p2(n.getHours())+p2(n.getMinutes())+p2(n.getSeconds())+'.jpg';
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(a.href),5000);
      hideL();shutter.classList.remove('busy');
      const ss=document.getElementById('save-status');ss.classList.add('show');
      setTimeout(()=>ss.classList.remove('show'),2500);
    },'image/jpeg',0.93);

  }catch(err){hideL();shutter.classList.remove('busy');toast('Ошибка: '+err.message,'err');console.error(err);}
}

// ══════════════════════════════════════
//  EXIF ORIENTATION
// ══════════════════════════════════════
function readExifOri(blob){
  return new Promise(resolve=>{
    const rd=new FileReader();
    rd.onload=e=>{
      try{
        const v=new DataView(e.target.result);
        if(v.getUint16(0)!==0xFFD8){resolve(1);return;}
        let off=2;
        while(off<v.byteLength-2){
          const mk=v.getUint16(off);
          if(mk===0xFFE1){
            const eo=off+4;
            if(v.getUint8(eo)===0x45&&v.getUint8(eo+1)===0x78){
              const ts=eo+6;const le=v.getUint16(ts)===0x4949;
              const gu=(o,s)=>s===2?v.getUint16(o,le):v.getUint32(o,le);
              const ifd=ts+gu(ts+4,4);const cnt=gu(ifd,2);
              for(let i=0;i<cnt;i++){const e=ifd+2+i*12;if(gu(e,2)===0x0112){resolve(gu(e+8,2));return;}}
            }
            off+=2+v.getUint16(off+2);
          }else if((mk&0xFF00)===0xFF00)off+=2+v.getUint16(off+2);
          else break;
        }
      }catch(e){}
      resolve(1);
    };
    rd.onerror=()=>resolve(1);
    rd.readAsArrayBuffer(blob.slice(0,65536));
  });
}

function normalizeCanvas(src,ori){
  const W=src.width,H=src.height;
  const cv=document.createElement('canvas');
  const cx=cv.getContext('2d');
  if(ori>=5&&ori<=8){cv.width=H;cv.height=W;}else{cv.width=W;cv.height=H;}
  cx.save();
  switch(ori){case 2:cx.transform(-1,0,0,1,W,0);break;case 3:cx.transform(-1,0,0,-1,W,H);break;case 4:cx.transform(1,0,0,-1,0,H);break;case 5:cx.transform(0,1,1,0,0,0);break;case 6:cx.transform(0,1,-1,0,H,0);break;case 7:cx.transform(0,-1,-1,0,H,W);break;case 8:cx.transform(0,-1,1,0,0,W);break;}
  cx.drawImage(src,0,0);cx.restore();
  return cv;
}

// ══════════════════════════════════════
//  QR STAMP — нижний левый угол
// ══════════════════════════════════════
function stampQR(cx,W,H,qrTxt,dateStr,gpsStr,hmac){
  const ms=Math.min(W,H),qrSz=Math.max(Math.round(ms*.17),90);
  const mg=Math.round(ms*.02),pd=Math.round(qrSz*.1),fs=Math.max(Math.round(qrSz*.09),10),lh=fs+5;
  const bW=qrSz+pd*2,bH=qrSz+pd*2+lh*3+pd;
  const bx=mg,by=H-mg-bH;
  const cs=Math.max(Math.ceil(qrSz/33),2),qrCv=window.makeQR(qrTxt,cs);
  cx.shadowColor='rgba(0,0,0,.55)';cx.shadowBlur=18;cx.shadowOffsetX=2;cx.shadowOffsetY=2;
  cx.fillStyle='rgba(255,255,255,.97)';rrect(cx,bx,by,bW,bH,10);cx.fill();
  cx.shadowColor='transparent';cx.shadowBlur=0;
  cx.drawImage(qrCv,bx+pd,by+pd,qrSz,qrSz);
  const tx=bx+pd;let ty=by+pd+qrSz+fs+3;
  cx.textAlign='left';cx.fillStyle='#000';cx.font='bold '+fs+'px monospace';
  cx.fillText(dateStr.replace('T',' ').slice(0,16),tx,ty);ty+=lh;
  cx.fillStyle='#333';cx.font=fs+'px monospace';
  cx.fillText(gpsStr==='NO_GPS'?'GPS: —':gpsStr.replace(',',', '),tx,ty);ty+=lh;
  cx.fillStyle='#888';cx.fillText('SIG: '+hmac.slice(0,12)+'…',tx,ty);
}
function rrect(cx,x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();}

function show(id){['s-start','s-cam'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}
async function hmacSign(key,msg){const enc=new TextEncoder();const k=await crypto.subtle.importKey('raw',enc.encode(key),{name:'HMAC',hash:'SHA-256'},false,['sign']);const s=await crypto.subtle.sign('HMAC',k,enc.encode(msg));return Array.from(new Uint8Array(s)).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase().slice(0,16);}
function p2(n){return String(n).padStart(2,'0');}
function isoNow(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+'T'+p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());}
function showL(t){document.getElementById('ltxt').textContent=t;document.getElementById('loader').classList.add('show');}
function hideL(){document.getElementById('loader').classList.remove('show');}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className=type||'';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
