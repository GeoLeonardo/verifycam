<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ВерифиКам">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>ВерифиКам</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif;color:#fff}

/* ── СТРАНИЦЫ ── */
.page{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.page.off{display:none}

/* ── СТРАНИЦА: СТАТУС (загрузка / ошибки GPS / камера) ── */
#pg-status{background:#0a0a0f;padding:28px 24px;gap:16px;text-align:center}
.st-icon{font-size:56px}
.st-title{font-size:20px;font-weight:700}
.st-msg{font-size:14px;color:rgba(255,255,255,.55);line-height:1.7;max-width:300px}
.st-box{width:100%;max-width:320px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 20px;text-align:left}
.st-box p{font-size:13px;color:rgba(255,255,255,.65);line-height:1.8}
.st-box b{color:#f5c518}
.btn-retry{margin-top:4px;padding:15px 40px;border-radius:14px;background:#f5c518;color:#000;font-size:15px;font-weight:700;border:none;cursor:pointer}
.spinner{width:40px;height:40px;border-radius:50%;border:3px solid rgba(255,255,255,.1);border-top-color:#f5c518;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── СТРАНИЦА: КАМЕРА ── */
#pg-cam{background:#000}
.cam-vf{flex:1;position:relative;overflow:hidden}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* Сетка */
.grid{position:absolute;inset:0;z-index:1;pointer-events:none;
  display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr}
.grid div{border:1px solid rgba(255,255,255,.07)}

/* Угловые маркеры */
.corner{position:absolute;width:22px;height:22px;z-index:2;pointer-events:none}
.corner.tl{top:14px;left:14px;border-top:2px solid rgba(255,255,255,.7);border-left:2px solid rgba(255,255,255,.7)}
.corner.tr{top:14px;right:14px;border-top:2px solid rgba(255,255,255,.7);border-right:2px solid rgba(255,255,255,.7)}
.corner.bl{bottom:14px;left:14px;border-bottom:2px solid rgba(255,255,255,.7);border-left:2px solid rgba(255,255,255,.7)}
.corner.br{bottom:14px;right:14px;border-bottom:2px solid rgba(255,255,255,.7);border-right:2px solid rgba(255,255,255,.7)}

/* HUD — верхняя строка */
.hud{position:absolute;top:0;left:0;right:0;z-index:3;pointer-events:none;
  padding:max(env(safe-area-inset-top,12px),12px) 14px 8px;
  display:flex;align-items:center;justify-content:space-between}
.hud-time{font-size:13px;font-weight:600;letter-spacing:.04em;
  color:rgba(255,255,255,.9);text-shadow:0 1px 5px #000;font-variant-numeric:tabular-nums}
.hud-gps{font-size:10px;font-weight:600;letter-spacing:.05em;
  padding:3px 10px;border-radius:20px;backdrop-filter:blur(6px)}
.hud-gps.searching{background:rgba(0,0,0,.5);color:rgba(255,255,255,.5);
  border:1px solid rgba(255,255,255,.15);animation:blink 1.2s ease infinite}
.hud-gps.ok{background:rgba(74,222,128,.18);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.hud-gps.lost{background:rgba(248,113,113,.18);color:#f87171;border:1px solid rgba(248,113,113,.3);animation:blink .8s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ID клиента */
.cam-id{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  z-index:3;pointer-events:none;
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:3px 14px;
  font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.07em;
  backdrop-filter:blur(6px);white-space:nowrap}

/* Вспышка экрана */
.flash{position:absolute;inset:0;z-index:10;background:#fff;opacity:0;pointer-events:none;transition:opacity .05s}
.flash.go{opacity:.85}

/* Зум слайдер */
.zoom-wrap{position:absolute;bottom:14px;left:14px;right:14px;z-index:4;
  display:none;align-items:center;gap:10px}
.zoom-wrap.show{display:flex}
.zoom-lbl{font-size:10px;color:rgba(255,255,255,.6);min-width:32px;text-align:center;text-shadow:0 1px 4px #000}
input.zoom{flex:1;-webkit-appearance:none;height:3px;background:rgba(255,255,255,.25);border-radius:99px;outline:none}
input.zoom::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#f5c518;box-shadow:0 2px 5px rgba(0,0,0,.5)}
input.zoom::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#f5c518;border:none}

/* Тост */
.toast{position:absolute;bottom:105px;left:50%;transform:translateX(-50%) translateY(8px);
  z-index:9;pointer-events:none;
  background:rgba(8,8,8,.95);border:1px solid rgba(255,255,255,.12);
  border-radius:99px;padding:10px 20px;font-size:13px;font-weight:500;
  white-space:nowrap;backdrop-filter:blur(10px);
  opacity:0;transition:opacity .2s,transform .2s;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.4)}
.toast.err{border-color:rgba(248,113,113,.4)}

/* ── НИЖНЯЯ ПАНЕЛЬ ── */
.cam-bar{flex-shrink:0;background:#000;
  padding:12px 0 max(env(safe-area-inset-bottom,20px),20px);
  display:flex;align-items:center;justify-content:space-around}

.bar-btn{width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);
  font-size:22px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none}
.bar-btn.dim{opacity:.3;pointer-events:none}
.bar-btn.lit{background:rgba(245,197,24,.22);border:1px solid rgba(245,197,24,.5)}

.shutter{width:80px;height:80px;border-radius:50%;
  border:3px solid rgba(255,255,255,.85);background:transparent;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.shutter-disc{width:66px;height:66px;border-radius:50%;background:#fff;transition:background .1s}
.shutter.busy .shutter-disc{background:#f5c518;animation:pulse .5s ease infinite}
.shutter.blocked{opacity:.4;pointer-events:none}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(.88)}}
</style>
</head>
<body>

<!-- ═══════════ СТРАНИЦА СТАТУСА ═══════════ -->
<div class="page" id="pg-status">
  <div class="st-icon" id="st-icon">📷</div>
  <div class="spinner" id="st-spinner"></div>
  <div class="st-title" id="st-title">Запуск…</div>
  <div class="st-msg"  id="st-msg"></div>
  <div class="st-box"  id="st-box" style="display:none">
    <p id="st-steps"></p>
  </div>
  <button class="btn-retry" id="btn-retry" style="display:none" onclick="location.reload()">🔄 Повторить</button>
</div>

<!-- ═══════════ СТРАНИЦА КАМЕРЫ ═══════════ -->
<div class="page off" id="pg-cam">

  <div class="cam-vf">
    <video id="video" autoplay playsinline muted></video>

    <div class="grid">
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="hud">
      <div class="hud-time" id="hud-time">00:00:00</div>
      <div class="hud-gps searching" id="hud-gps">⌖ GPS…</div>
    </div>

    <!-- Зум -->
    <div class="zoom-wrap" id="zoom-wrap">
      <span class="zoom-lbl" id="zoom-val">1×</span>
      <input class="zoom" id="zoom-range" type="range" min="1" max="5" step="0.1" value="1"
        oninput="applyZoom(+this.value)"
        ontouchstart="event.stopPropagation()" onclick="event.stopPropagation()">
      <span class="zoom-lbl">5×</span>
    </div>

    <div class="cam-id" id="cam-id">ID: —</div>
    <div class="flash" id="flash"></div>
    <div class="toast" id="toast"></div>
  </div>

  <div class="cam-bar">
    <button class="bar-btn dim" id="btn-torch" onclick="toggleTorch()">🔦</button>
    <button class="shutter blocked" id="shutter" onclick="shoot()">
      <div class="shutter-disc"></div>
    </button>
    <button class="bar-btn" id="btn-flip" onclick="flipCam()">⟳</button>
  </div>
</div>

<!-- Рабочий canvas (скрыт) -->
<canvas id="cv" style="display:none"></canvas>
<!-- Контейнер для QR генерации (за экраном) -->
<div id="qrbox" style="position:fixed;left:-9999px;top:0"></div>

<!-- ═══════════ QR БИБЛИОТЕКА (встроена, офлайн) ═══════════ -->

<script>
// ════════════════════════════════════════════
//  КОНФИГУРАЦИЯ
// ════════════════════════════════════════════
var CFG = { SECRET_KEY:'', CLIENT_ID:'CLIENT_001', VER:'1.0' };

// Транслитерация — убираем кириллицу, иначе QR переполнится
var TR = {'А':'A','Б':'B','В':'V','Г':'G','Д':'D','Е':'E','Ё':'YO','Ж':'ZH','З':'Z','И':'I','Й':'Y','К':'K','Л':'L','М':'M','Н':'N','О':'O','П':'P','Р':'R','С':'S','Т':'T','У':'U','Ф':'F','Х':'KH','Ц':'TS','Ч':'CH','Ш':'SH','Щ':'SCH','Ъ':'','Ы':'Y','Ь':'','Э':'E','Ю':'YU','Я':'YA','а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
function lat(s){return s.split('').map(function(c){return TR[c]!==undefined?TR[c]:c;}).join('');}

// ════════════════════════════════════════════
//  СОСТОЯНИЕ
// ════════════════════════════════════════════
var GPS = null;          // {lat, lon} — последние координаты
var stream = null;       // MediaStream
var facing = 'environment';
var torchOn = false;
var torchOk = false;
var zoomOk  = false;
var busy    = false;

// ════════════════════════════════════════════
//  ЗАПУСК
// ════════════════════════════════════════════
window.addEventListener('load', function() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
  start();
});

async function start() {
  // Загружаем config
  status('spinner', '📷', 'Загрузка…', '');
  try {
    var r = await fetch('config.json?_='+Date.now());
    if (r.ok) {
      var j = await r.json();
      if (j.SECRET_KEY) CFG.SECRET_KEY = j.SECRET_KEY;
      if (j.CLIENT_ID)  CFG.CLIENT_ID  = j.CLIENT_ID;
      if (j.VER)        CFG.VER        = j.VER;
    }
  } catch(e) {}
  var urlId = new URLSearchParams(location.search).get('id');
  if (urlId) CFG.CLIENT_ID = urlId;

  // Показываем экран камеры ДО вызова getUserMedia и play()
  // Видео ДОЛЖНО быть видимым (не display:none) при инициализации
  document.getElementById('cam-id').textContent = 'ID: ' + CFG.CLIENT_ID;
  document.getElementById('pg-status').classList.add('off');
  document.getElementById('pg-cam').classList.remove('off');
  startClock();

  // Шаг 1 — камера (вызываем ПОСЛЕ того как video виден на экране)
  if (!await initCamera()) {
    document.getElementById('pg-cam').classList.add('off');
    status('error', '📷', 'Нет доступа к камере',
      'Нажмите 🔒 в адресной строке → Разрешите камеру → Перезагрузите страницу');
    return;
  }

  // Шаг 2 — GPS (ОБЯЗАТЕЛЕН)
  // Пока идёт поиск GPS — затвор заблокирован (shutter.blocked)
  var gpsResult = await initGPS();
  if (!gpsResult) {
    document.getElementById('pg-cam').classList.add('off');
    status('error', '📍', 'GPS не определён',
      '<b>Без GPS верификация невозможна.</b><br><br>' +
      '1. Включите геолокацию: Настройки → Местоположение → Вкл<br>' +
      '2. Разрешите геолокацию браузеру<br>' +
      '3. Нажмите «Повторить»<br><br>' +
      'Выйдите на улицу или к окну — GPS внутри зданий определяется дольше');
    return;
  }
  watchGPS();
}

// Показывает экран статуса
function status(type, icon, title, msg) {
  document.getElementById('st-icon').textContent    = icon;
  document.getElementById('st-title').textContent   = title;
  document.getElementById('st-spinner').style.display = type === 'spinner' ? 'block' : 'none';
  document.getElementById('btn-retry').style.display  = type === 'error'   ? 'block' : 'none';

  var box   = document.getElementById('st-box');
  var steps = document.getElementById('st-steps');
  if (msg) {
    box.style.display = 'block';
    steps.innerHTML   = msg;
  } else {
    box.style.display = 'none';
  }
  document.getElementById('st-msg').textContent = '';
  document.getElementById('pg-status').classList.remove('off');
  document.getElementById('pg-cam').classList.add('off');
}

// ════════════════════════════════════════════
//  КАМЕРА
// ════════════════════════════════════════════
async function initCamera() {
  try {
    if (stream) { stream.getTracks().forEach(function(t){t.stop();}); stream=null; }
    torchOn=false; torchOk=false; zoomOk=false;

    // Сначала пробуем без ограничений по разрешению — надёжнее
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facing } },
      audio: false
    });
    var v = document.getElementById('video');
    v.srcObject = stream;

    // Ждём готовности видео (canplay) — без этого бывает чёрный экран
    await new Promise(function(resolve, reject) {
      v.oncanplay = resolve;
      v.onerror   = reject;
      v.play().catch(reject);
      // Страховка: если canplay не пришёл за 3 сек — всё равно продолжаем
      setTimeout(resolve, 3000);
    });

    // Проверяем torch и zoom
    var track = stream.getVideoTracks()[0];
    if (track && track.getCapabilities) {
      var caps = track.getCapabilities();
      if (caps.torch) {
        torchOk = true;
        document.getElementById('btn-torch').classList.remove('dim');
      }
      if (caps.zoom && caps.zoom.max > 1) {
        zoomOk = true;
        var zr = document.getElementById('zoom-range');
        zr.min = caps.zoom.min || 1;
        zr.max = Math.min(caps.zoom.max, 8);
        zr.value = 1;
        document.getElementById('zoom-wrap').classList.add('show');
      }
    }
    return true;
  } catch(e) { console.error('cam:', e); return false; }
}

async function flipCam() {
  facing = facing === 'environment' ? 'user' : 'environment';
  if (torchOn) await applyTorch(false);
  await initCamera();
}

// ════════════════════════════════════════════
//  GPS — КРИТИЧНО
//  Сначала быстрый запрос getCurrentPosition
//  Если не ответил за 12 секунд — ошибка
// ════════════════════════════════════════════
function initGPS() {
  return new Promise(function(resolve) {
    if (!navigator.geolocation) { resolve(false); return; }
    var done = false;
    var timer = setTimeout(function(){
      if (!done) { done=true; resolve(false); }
    }, 12000);
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        if (done) return; done=true;
        clearTimeout(timer);
        GPS = { lat: pos.coords.latitude.toFixed(6), lon: pos.coords.longitude.toFixed(6) };
        resolve(true);
      },
      function(err) {
        if (done) return; done=true;
        clearTimeout(timer);
        resolve(false);
      },
      { enableHighAccuracy:true, timeout:11000, maximumAge:0 }
    );
  });
}

// Постоянное слежение за GPS после запуска
function watchGPS() {
  if (!navigator.geolocation) return;
  var badge = document.getElementById('hud-gps');
  var shutter = document.getElementById('shutter');

  navigator.geolocation.watchPosition(
    function(pos) {
      GPS = { lat: pos.coords.latitude.toFixed(6), lon: pos.coords.longitude.toFixed(6) };
      badge.textContent = '⌖ ' + GPS.lat + ' ' + GPS.lon;
      badge.className = 'hud-gps ok';
      // Разблокируем затвор
      shutter.classList.remove('blocked');
    },
    function(err) {
      // GPS потерян — блокируем съёмку
      badge.textContent = '⌖ GPS потерян — съёмка заблокирована';
      badge.className = 'hud-gps lost';
      shutter.classList.add('blocked');
      toast('⛔ GPS потерян. Выйдите на улицу.', 'err');
    },
    { enableHighAccuracy:true, maximumAge:5000, timeout:15000 }
  );
}

// ════════════════════════════════════════════
//  ВСПЫШКА
// ════════════════════════════════════════════
async function applyTorch(on) {
  if (!torchOk || !stream) return;
  try {
    var track = stream.getVideoTracks()[0];
    await track.applyConstraints({ advanced:[{torch:on}] });
    torchOn = on;
    var btn = document.getElementById('btn-torch');
    btn.textContent = on ? '💡' : '🔦';
    btn.classList.toggle('lit', on);
  } catch(e) {}
}

function toggleTorch() {
  if (!torchOk) { toast('Вспышка не поддерживается'); return; }
  applyTorch(!torchOn);
}

// ════════════════════════════════════════════
//  ЗУМ
// ════════════════════════════════════════════
async function applyZoom(val) {
  document.getElementById('zoom-val').textContent = parseFloat(val).toFixed(1) + '×';
  if (!zoomOk || !stream) return;
  try {
    var track = stream.getVideoTracks()[0];
    await track.applyConstraints({ advanced:[{zoom:val}] });
  } catch(e) {}
}

// ════════════════════════════════════════════
//  СЪЁМКА
//  Нажал — снял — сохранилось автоматически
//  Без GPS — не снимает
// ════════════════════════════════════════════
async function shoot() {
  if (busy) return;

  // GPS обязателен
  if (!GPS) {
    toast('⛔ GPS не определён — съёмка невозможна', 'err');
    return;
  }

  busy = true;
  var shutter = document.getElementById('shutter');
  shutter.classList.add('busy');

  // Вспышка экрана
  var fl = document.getElementById('flash');
  fl.classList.add('go');
  setTimeout(function(){ fl.classList.remove('go'); }, 120);

  try {
    // ── Снимаем кадр с видео ──
    var video = document.getElementById('video');
    var W = video.videoWidth  || 1280;
    var H = video.videoHeight || 960;
    var cv = document.getElementById('cv');
    var ctx = cv.getContext('2d');
    cv.width = W; cv.height = H;

    if (facing === 'user') {
      // Фронтальная камера — убираем зеркало
      ctx.save();
      ctx.translate(W, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, W, H);
      ctx.restore();
    } else {
      ctx.drawImage(video, 0, 0, W, H);
    }

    // ── Метаданные ──
    var now    = new Date();
    var date   = iso(now);
    var gps    = GPS.lat + ',' + GPS.lon;
    var idLat  = lat(CFG.CLIENT_ID);    // транслит ID (только ASCII → не переполняет QR)
    var payload = idLat + '|' + date + '|' + gps;
    var sig    = await hmac(CFG.SECRET_KEY, payload);

    // QR содержит: ID|ДАТА|GPS|ПОДПИСЬ|ВЕРСИЯ
    var qrTxt = idLat + '|' + date + '|' + gps + '|' + sig + '|' + CFG.VER;

    // ── Рисуем QR в нижнем левом углу ──
    await drawQR(ctx, W, H, qrTxt, date, gps, sig);

    // ── Сохраняем автоматически без подтверждения ──
    cv.toBlob(function(blob) {
      if (!blob) { done('Ошибка создания файла'); return; }

      var d = now;
      var name = 'VERIFY_' + CFG.CLIENT_ID + '_'
        + d.getFullYear() + p2(d.getMonth()+1) + p2(d.getDate())
        + '_' + p2(d.getHours()) + p2(d.getMinutes()) + p2(d.getSeconds())
        + '.jpg';

      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 8000);

      toast('✓ Сохранено', 'ok');
      done(null);
    }, 'image/jpeg', 0.93);

  } catch(e) {
    console.error(e);
    done('Ошибка: ' + e.message);
  }

  function done(err) {
    busy = false;
    shutter.classList.remove('busy');
    if (err) toast(err, 'err');
  }
}

// ════════════════════════════════════════════
//  QR ШТАМП — нижний левый угол
// ════════════════════════════════════════════
function drawQR(ctx, W, H, qrTxt, date, gps, sig) {
  return new Promise(function(resolve) {
    var minS = Math.min(W, H);
    var qSz  = Math.max(Math.round(minS * 0.17), 100);
    var mg   = Math.round(minS * 0.02);
    var pd   = Math.round(qSz * 0.10);
    var fs   = Math.max(Math.round(qSz * 0.09), 11);
    var lh   = fs + 6;
    var bW   = qSz + pd * 2;
    var bH   = qSz + pd * 2 + lh * 3 + pd;
    var bx   = mg;
    var by   = H - mg - bH;   // ← нижний левый

    // Генерируем QR
    var host = document.getElementById('qrbox');
    host.innerHTML = '';
    var qr = new QRCode(host, {
      text:         qrTxt,
      width:        qSz,
      height:       qSz,
      colorDark:    '#000000',
      colorLight:   '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    setTimeout(function() {
      var qrCv = host.querySelector('canvas');

      // Белый фон
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur  = 14;
      ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
      ctx.fillStyle = 'rgba(255,255,255,0.97)';
      rr(ctx, bx, by, bW, bH, 10);
      ctx.fill();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

      // QR
      if (qrCv) ctx.drawImage(qrCv, bx + pd, by + pd, qSz, qSz);

      // Текст: дата, GPS, подпись
      var tx = bx + pd;
      var ty = by + pd + qSz + fs + 4;
      ctx.textAlign = 'left';

      ctx.fillStyle = '#000';
      ctx.font = 'bold ' + fs + 'px monospace';
      ctx.fillText(date.replace('T',' ').slice(0,16), tx, ty); ty += lh;

      ctx.fillStyle = '#222';
      ctx.font = fs + 'px monospace';
      ctx.fillText(gps.replace(',', ', '), tx, ty); ty += lh;

      ctx.fillStyle = '#666';
      ctx.fillText('SIG: ' + sig, tx, ty);

      resolve();
    }, 60);
  });
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ════════════════════════════════════════════
//  HMAC-SHA256
// ════════════════════════════════════════════
async function hmac(key, msg) {
  var enc = new TextEncoder();
  var k = await crypto.subtle.importKey(
    'raw', enc.encode(key), {name:'HMAC',hash:'SHA-256'}, false, ['sign']
  );
  var s = await crypto.subtle.sign('HMAC', k, enc.encode(msg));
  return Array.from(new Uint8Array(s))
    .map(function(b){return b.toString(16).padStart(2,'0');})
    .join('').toUpperCase().slice(0,16);
}

// ════════════════════════════════════════════
//  УТИЛИТЫ
// ════════════════════════════════════════════
function iso(d) {
  return d.getFullYear() + '-' + p2(d.getMonth()+1) + '-' + p2(d.getDate()) +
    'T' + p2(d.getHours()) + ':' + p2(d.getMinutes()) + ':' + p2(d.getSeconds());
}
function p2(n) { return String(n).padStart(2,'0'); }

function startClock() {
  function tick() {
    var n = new Date();
    var el = document.getElementById('hud-time');
    if (el) el.textContent = p2(n.getHours())+':'+p2(n.getMinutes())+':'+p2(n.getSeconds());
  }
  tick(); setInterval(tick, 1000);
}

var _tt;
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}
