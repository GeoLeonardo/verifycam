<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="theme-color" content="#000000">
<title>ВерифиКам</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#00ff88;--y:#ffcc00;--r:#ff3355;--b:#00aaff;--dim:rgba(255,255,255,.5)}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;
  font-family:"Courier New",monospace;touch-action:none;
  -webkit-user-select:none;user-select:none}

/* LOADING */
#s-load{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;gap:20px}
.logo{font-size:26px;font-weight:700;letter-spacing:5px;color:#fff}
.logo span{color:var(--g)}
.spin{width:44px;height:44px;border:2px solid rgba(255,255,255,.1);
  border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.step{font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;min-height:16px}

/* ERROR */
#s-err{position:fixed;inset:0;background:#080808;display:none;flex-direction:column;
  align-items:center;justify-content:center;z-index:90;padding:28px;gap:16px;text-align:center}
.ei{font-size:60px}.et{font-size:18px;font-weight:700;letter-spacing:2px;color:var(--r)}
.em{font-size:12px;line-height:1.8;color:var(--dim);max-width:300px;white-space:pre-line}
.ebtn{margin-top:6px;padding:12px 32px;background:transparent;border:1px solid var(--g);
  color:var(--g);font-family:inherit;font-size:12px;letter-spacing:3px;
  text-transform:uppercase;cursor:pointer;transition:.2s}
.ebtn:hover{background:var(--g);color:#000}

/* CAMERA */
#s-cam{position:fixed;inset:0;background:#000;display:none;flex-direction:column}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
#overlay{position:absolute;inset:0;z-index:2;pointer-events:none}
.gl{position:absolute;background:rgba(255,255,255,.15)}
.gh1{top:33.33%;left:0;right:0;height:1px}
.gh2{top:66.66%;left:0;right:0;height:1px}
.gv1{left:33.33%;top:0;bottom:0;width:1px}
.gv2{left:66.66%;top:0;bottom:0;width:1px}
.cor{position:absolute;width:20px;height:20px;border-color:rgba(255,255,255,.75);border-style:solid}
.ctl{top:10%;left:5%;border-width:2px 0 0 2px}
.ctr{top:10%;right:5%;border-width:2px 2px 0 0}
.cbl{bottom:22%;left:5%;border-width:0 0 2px 2px}
.cbr{bottom:22%;right:5%;border-width:0 2px 2px 0}

/* HUD top */
#hud{position:absolute;top:0;left:0;right:0;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;z-index:3;
  background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent)}
#clock{font-size:16px;font-weight:700;letter-spacing:1px;text-shadow:0 1px 3px rgba(0,0,0,.8)}
#gbadge{font-size:10px;letter-spacing:1px;padding:4px 9px;border-radius:20px;font-weight:600;transition:.3s}
#gbadge.searching{background:rgba(255,204,0,.15);color:var(--y);border:1px solid var(--y);animation:blink 1s ease-in-out infinite}
#gbadge.active{background:rgba(0,255,136,.12);color:var(--g);border:1px solid var(--g)}
#gbadge.lost{background:rgba(255,51,85,.15);color:var(--r);border:1px solid var(--r);animation:blink .5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* GPS lost overlay */
#gps-ov{position:fixed;inset:0;background:rgba(0,0,0,.93);display:none;
  flex-direction:column;align-items:center;justify-content:center;
  z-index:40;padding:28px;gap:16px;text-align:center}
#gps-ov.vis{display:flex}

/* Client ID */
#cid{position:absolute;z-index:3;left:0;right:0;text-align:center;
  font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.4);text-transform:uppercase;
  bottom:calc(80px + env(safe-area-inset-bottom) + 18px)}

/* Zoom */
#zoom-w{position:absolute;z-index:3;
  bottom:calc(80px + env(safe-area-inset-bottom) + 54px);
  left:50%;transform:translateX(-50%);display:none;align-items:center;gap:10px}
#zoom-w.vis{display:flex}
#zval{font-size:11px;color:var(--dim);width:30px;text-align:right}
#zslider{-webkit-appearance:none;appearance:none;width:110px;height:3px;
  background:rgba(255,255,255,.25);border-radius:2px;outline:none}
#zslider::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;
  border-radius:50%;background:var(--g);cursor:pointer}

/* Bottom bar */
#bot{position:absolute;bottom:0;left:0;right:0;
  padding:14px 36px calc(14px + env(safe-area-inset-bottom));
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(to top,rgba(0,0,0,.78),transparent);z-index:3}
.cbtn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);color:#fff;font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s;
  -webkit-tap-highlight-color:transparent}
.cbtn:active{transform:scale(.88);background:rgba(255,255,255,.22)}
.cbtn:disabled{opacity:.3;cursor:not-allowed}
.cbtn.on{background:rgba(255,204,0,.2);border-color:var(--y);color:var(--y)}

#shut{width:70px;height:70px;background:rgba(255,255,255,.88);
  border:3px solid rgba(255,255,255,.35);border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 4px rgba(255,255,255,.12);position:relative;transition:.15s;
  -webkit-tap-highlight-color:transparent}
#shut::after{content:"";width:54px;height:54px;border-radius:50%;
  background:rgba(255,255,255,.93);position:absolute}
#shut:active{transform:scale(.92)}
#shut:disabled{opacity:.3;cursor:not-allowed}
#shut.locked::after{background:var(--r)}

/* Flash */
#flash{position:fixed;inset:0;background:#fff;opacity:0;
  pointer-events:none;z-index:50;transition:opacity .12s}
#flash.on{opacity:1}

/* Toast */
#toast{position:fixed;left:50%;transform:translateX(-50%) translateY(16px);
  bottom:calc(96px + env(safe-area-inset-bottom));
  background:rgba(0,255,136,.12);border:1px solid var(--g);color:var(--g);
  padding:9px 22px;border-radius:22px;font-size:12px;letter-spacing:2px;
  white-space:nowrap;opacity:0;transition:.3s;z-index:60;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Install button — green V in circle */
#inst{position:fixed;top:12px;right:14px;
  width:38px;height:38px;border-radius:50%;
  background:rgba(0,255,136,.15);border:2px solid var(--g);
  color:var(--g);font-size:18px;font-weight:700;
  cursor:pointer;z-index:80;display:none;
  align-items:center;justify-content:center;
  font-family:"Courier New",monospace;
  -webkit-tap-highlight-color:transparent}
#inst.vis{display:flex}
</style>
</head>
<body>

<div id="s-load">
  <div class="logo">Вери<span>Фи</span>Кам</div>
  <div class="spin"></div>
  <div class="step" id="step">Инициализация…</div>
</div>

<div id="s-err">
  <div class="ei" id="ei">📷</div>
  <div class="et" id="et">Ошибка</div>
  <div class="em" id="em"></div>
  <button class="ebtn" onclick="retryInit()">Повторить</button>
</div>

<div id="gps-ov">
  <div style="font-size:54px">📡</div>
  <div style="font-size:17px;font-weight:700;letter-spacing:2px;color:var(--r)">GPS НЕ ОПРЕДЕЛЁН</div>
  <div style="font-size:12px;line-height:1.8;color:var(--dim);max-width:290px">
    Съёмка без GPS невозможна.<br><br>
    1. Настройки → Местоположение → Включить<br>
    2. Разрешите геолокацию для браузера<br>
    3. Выйдите на открытое место<br>
    4. Подождите 10–30 секунд
  </div>
  <button class="ebtn" onclick="retryGPS()">Повторить GPS</button>
</div>

<div id="s-cam">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay">
    <div class="gl gh1"></div><div class="gl gh2"></div>
    <div class="gl gv1"></div><div class="gl gv2"></div>
    <div class="cor ctl"></div><div class="cor ctr"></div>
    <div class="cor cbl"></div><div class="cor cbr"></div>
  </div>
  <div id="hud">
    <div id="clock">00:00:00</div>
    <div id="gbadge" class="searching">⌖ GPS…</div>
  </div>
  <div id="zoom-w">
    <span id="zval">1×</span>
    <input type="range" id="zslider" min="1" max="5" step="0.1" value="1">
  </div>
  <div id="cid"></div>
  <div id="bot">
    <button class="cbtn" id="tbtn" onclick="toggleTorch()" title="Вспышка">🔦</button>
    <button id="shut" onclick="takePhoto()" disabled></button>
    <button class="cbtn" onclick="flipCam()" title="Переключить">⟳</button>
  </div>
</div>

<div id="flash"></div>
<div id="toast"></div>
<!-- Install: green V in circle -->
<button id="inst" onclick="installPWA()" title="Установить приложение">V</button>
<canvas id="cv" style="display:none"></canvas>

<script>
// ===== QR LIBRARY (nayuki qrcodegen, MIT License, offline) =====
/*
 * QR Code generator library (TypeScript)
 *
 * Copyright (c) Project Nayuki. (MIT License)
 * https://www.nayuki.io/page/qr-code-generator-library
 *
 * Permission is hereby granted, free of charge, to any person obtaining a copy of

 *   all copies or substantial portions of the Software.
 * - The Software is provided "as is", without warranty of any kind, express or
 *   implied, including but not limited to the warranties of merchantability,
 *   fitness for a particular purpose and noninfringement. In no event shall the
 *   authors or copyright holders be liable for any claim, damages or other
 *   liability, whether in an action of contract, tort or otherwise, arising from,
 *   out of or in connection with the Software or the use or other dealings in the
 *   Software.
 */
"use strict";
var qrcodegen;
(function (qrcodegen) {
    /*---- QR Code symbol class ----*/
    /*
     * A QR Code symbol, which is a type of two-dimension barcode.
     * Invented by Denso Wave and described in the ISO/IEC 18004 standard.
     * Instances of this class represent an immutable square grid of dark and light cells.
     * The class provides static factory functions to create a QR Code from text or binary data.
     * The class covers the QR Code Model 2 specification, supporting all versions (sizes)
     * from 1 to 40, all 4 error correction levels, and 4 character encoding modes.
     *
     * Ways to create a QR Code object:
     * - High level: Take the payload data and call QrCode.encodeText() or QrCode.encodeBinary().
     * - Mid level: Custom-make the list of segments and call QrCode.encodeSegments().
     * - Low level: Custom-make the array of data codeword bytes (including
     *   segment headers and final padding, excluding error correction codewords),
     *   supply the appropriate version number, and call the QrCode() constructor.
     * (Note that all ways require supplying the desired error correction level.)
     */
    class QrCode {
        /*-- Constructor (low level) and fields --*/
        // Creates a new QR Code with the given version number,
        // error correction level, data codeword bytes, and mask number.
        // This is a low-level API that most users should not use directly.
        // A mid-level API is the encodeSegments() function.
        constructor(
        // The version number of this QR Code, which is between 1 and 40 (inclusive).
        // This determines the size of this barcode.
        version, 
        // The error correction level used in this QR Code.
        errorCorrectionLevel, dataCodewords, msk) {
            this.version = version;
            this.errorCorrectionLevel = errorCorrectionLevel;
            // The modules of this QR Code (false = light, true = dark).
            // Immutable after constructor finishes. Accessed through getModule().
            this.modules = [];
            // Indicates function modules that are not subjected to masking. Discarded when constructor finishes.
            this.isFunction = [];
            // Check scalar arguments
            if (version < QrCode.MIN_VERSION || version > QrCode.MAX_VERSION)
                throw new RangeError("Version value out of range");
            if (msk < -1 || msk > 7)
                throw new RangeError("Mask value out of range");
            this.size = version * 4 + 17;
            // Initialize both grids to be size*size arrays of Boolean false
            let row = [];
            for (let i = 0; i < this.size; i++)
                row.push(false);
            for (let i = 0; i < this.size; i++) {
                this.modules.push(row.slice()); // Initially all light
                this.isFunction.push(row.slice());
            }
            // Compute ECC, draw modules
            this.drawFunctionPatterns();
            const allCodewords = this.addEccAndInterleave(dataCodewords);
            this.drawCodewords(allCodewords);
            // Do masking
            if (msk == -1) { // Automatically choose best mask
                let minPenalty = 1000000000;
                for (let i = 0; i < 8; i++) {
                    this.applyMask(i);
                    this.drawFormatBits(i);
                    const penalty = this.getPenaltyScore();
                    if (penalty < minPenalty) {
                        msk = i;
                        minPenalty = penalty;
                    }
                    this.applyMask(i); // Undoes the mask due to XOR
                }
            }
            assert(0 <= msk && msk <= 7);
            this.mask = msk;
            this.applyMask(msk); // Apply the final choice of mask
            this.drawFormatBits(msk); // Overwrite old format bits
            this.isFunction = [];
        }
        /*-- Static factory functions (high level) --*/
        // Returns a QR Code representing the given Unicode text string at the given error correction level.
        // As a conservative upper bound, this function is guaranteed to succeed for strings that have 738 or fewer
        // Unicode code points (not UTF-16 code units) if the low error correction level is used. The smallest possible
        // QR Code version is automatically chosen for the output. The ECC level of the result may be higher than the
        // ecl argument if it can be done without increasing the version.
        static encodeText(text, ecl) {
            const segs = qrcodegen.QrSegment.makeSegments(text);
            return QrCode.encodeSegments(segs, ecl);
        }
        // Returns a QR Code representing the given binary data at the given error correction level.
        // This function always encodes using the binary segment mode, not any text mode. The maximum number of
        // bytes allowed is 2953. The smallest possible QR Code version is automatically chosen for the output.
        // The ECC level of the result may be higher than the ecl argument if it can be done without increasing the version.
        static encodeBinary(data, ecl) {
            const seg = qrcodegen.QrSegment.makeBytes(data);
            return QrCode.encodeSegments([seg], ecl);
        }
        /*-- Static factory functions (mid level) --*/
        // Returns a QR Code representing the given segments with the given encoding parameters.
        // The smallest possible QR Code version within the given range is automatically
        // chosen for the output. Iff boostEcl is true, then the ECC level of the result
        // may be higher than the ecl argument if it can be done without increasing the
        // version. The mask number is either between 0 to 7 (inclusive) to force that
        // mask, or -1 to automatically choose an appropriate mask (which may be slow).
        // This function allows the user to create a custom sequence of segments that switches
        // between modes (such as alphanumeric and byte) to encode text in less space.
        // This is a mid-level API; the high-level API is encodeText() and encodeBinary().
        static encodeSegments(segs, ecl, minVersion = 1, maxVersion = 40, mask = -1, boostEcl = true) {
            if (!(QrCode.MIN_VERSION <= minVersion && minVersion <= maxVersion && maxVersion <= QrCode.MAX_VERSION)
                || mask < -1 || mask > 7)
                throw new RangeError("Invalid value");
            // Find the minimal version number to use
            let version;
            let dataUsedBits;
            for (version = minVersion;; version++) {
                const dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8; // Number of data bits available
                const usedBits = QrSegment.getTotalBits(segs, version);
                if (usedBits <= dataCapacityBits) {
                    dataUsedBits = usedBits;
                    break; // This version number is found to be suitable
                }
                if (version >= maxVersion) // All versions in the range could not fit the given data
                    throw new RangeError("Data too long");
            }
            // Increase the error correction level while the data still fits in the current version number
            for (const newEcl of [QrCode.Ecc.MEDIUM, QrCode.Ecc.QUARTILE, QrCode.Ecc.HIGH]) { // From low to high
                if (boostEcl && dataUsedBits <= QrCode.getNumDataCodewords(version, newEcl) * 8)
                    ecl = newEcl;
            }
            // Concatenate all segments to create the data bit string
            let bb = [];
            for (const seg of segs) {
                appendBits(seg.mode.modeBits, 4, bb);
                appendBits(seg.numChars, seg.mode.numCharCountBits(version), bb);
                for (const b of seg.getData())
                    bb.push(b);
            }
            assert(bb.length == dataUsedBits);
            // Add terminator and pad up to a byte if applicable
            const dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
            assert(bb.length <= dataCapacityBits);
            appendBits(0, Math.min(4, dataCapacityBits - bb.length), bb);
            appendBits(0, (8 - bb.length % 8) % 8, bb);
            assert(bb.length % 8 == 0);
            // Pad with alternating bytes until data capacity is reached
            for (let padByte = 0xEC; bb.length < dataCapacityBits; padByte ^= 0xEC ^ 0x11)
                appendBits(padByte, 8, bb);
            // Pack bits into bytes in big endian
            let dataCodewords = [];
            while (dataCodewords.length * 8 < bb.length)
                dataCodewords.push(0);
            bb.forEach((b, i) => dataCodewords[i >>> 3] |= b << (7 - (i & 7)));
            // Create the QR Code object
            return new QrCode(version, ecl, dataCodewords, mask);
        }
        /*-- Accessor methods --*/
        // Returns the color of the module (pixel) at the given coordinates, which is false
        // for light or true for dark. The top left corner has the coordinates (x=0, y=0).
        // If the given coordinates are out of bounds, then false (light) is returned.
        getModule(x, y) {
            return 0 <= x && x < this.size && 0 <= y && y < this.size && this.modules[y][x];
        }
        /*-- Private helper methods for constructor: Drawing function modules --*/
        // Reads this object's version field, and draws and marks all function modules.
        drawFunctionPatterns() {
            // Draw horizontal and vertical timing patterns
            for (let i = 0; i < this.size; i++) {
                this.setFunctionModule(6, i, i % 2 == 0);
                this.setFunctionModule(i, 6, i % 2 == 0);
            }
            // Draw 3 finder patterns (all corners except bottom right; overwrites some timing modules)
            this.drawFinderPattern(3, 3);
            this.drawFinderPattern(this.size - 4, 3);
            this.drawFinderPattern(3, this.size - 4);
            // Draw numerous alignment patterns
            const alignPatPos = this.getAlignmentPatternPositions();
            const numAlign = alignPatPos.length;
            for (let i = 0; i < numAlign; i++) {
                for (let j = 0; j < numAlign; j++) {
                    // Don't draw on the three finder corners
                    if (!(i == 0 && j == 0 || i == 0 && j == numAlign - 1 || i == numAlign - 1 && j == 0))
                        this.drawAlignmentPattern(alignPatPos[i], alignPatPos[j]);
                }
            }
            // Draw configuration data
            this.drawFormatBits(0); // Dummy mask value; overwritten later in the constructor
            this.drawVersion();
        }
        // Draws two copies of the format bits (with its own error correction code)
        // based on the given mask and this object's error correction level field.
        drawFormatBits(mask) {
            // Calculate error correction code and pack bits
            const data = this.errorCorrectionLevel.formatBits << 3 | mask; // errCorrLvl is uint2, mask is uint3
            let rem = data;
            for (let i = 0; i < 10; i++)
                rem = (rem << 1) ^ ((rem >>> 9) * 0x537);
            const bits = (data << 10 | rem) ^ 0x5412; // uint15
            assert(bits >>> 15 == 0);
            // Draw first copy
            for (let i = 0; i <= 5; i++)
                this.setFunctionModule(8, i, getBit(bits, i));
            this.setFunctionModule(8, 7, getBit(bits, 6));
            this.setFunctionModule(8, 8, getBit(bits, 7));
            this.setFunctionModule(7, 8, getBit(bits, 8));
            for (let i = 9; i < 15; i++)
                this.setFunctionModule(14 - i, 8, getBit(bits, i));
            // Draw second copy
            for (let i = 0; i < 8; i++)
                this.setFunctionModule(this.size - 1 - i, 8, getBit(bits, i));
            for (let i = 8; i < 15; i++)
                this.setFunctionModule(8, this.size - 15 + i, getBit(bits, i));
            this.setFunctionModule(8, this.size - 8, true); // Always dark
        }
        // Draws two copies of the version bits (with its own error correction code),
        // based on this object's version field, iff 7 <= version <= 40.
        drawVersion() {
            if (this.version < 7)
                return;
            // Calculate error correction code and pack bits
            let rem = this.version; // version is uint6, in the range [7, 40]
            for (let i = 0; i < 12; i++)
                rem = (rem << 1) ^ ((rem >>> 11) * 0x1F25);
            const bits = this.version << 12 | rem; // uint18
            assert(bits >>> 18 == 0);
            // Draw two copies
            for (let i = 0; i < 18; i++) {
                const color = getBit(bits, i);
                const a = this.size - 11 + i % 3;
                const b = Math.floor(i / 3);
                this.setFunctionModule(a, b, color);
                this.setFunctionModule(b, a, color);
            }
        }
        // Draws a 9*9 finder pattern including the border separator,
        // with the center module at (x, y). Modules can be out of bounds.
        drawFinderPattern(x, y) {
            for (let dy = -4; dy <= 4; dy++) {
                for (let dx = -4; dx <= 4; dx++) {
                    const dist = Math.max(Math.abs(dx), Math.abs(dy)); // Chebyshev/infinity norm
                    const xx = x + dx;
                    const yy = y + dy;
                    if (0 <= xx && xx < this.size && 0 <= yy && yy < this.size)
                        this.setFunctionModule(xx, yy, dist != 2 && dist != 4);
                }
            }
        }
        // Draws a 5*5 alignment pattern, with the center module
        // at (x, y). All modules must be in bounds.
        drawAlignmentPattern(x, y) {
            for (let dy = -2; dy <= 2; dy++) {
                for (let dx = -2; dx <= 2; dx++)
                    this.setFunctionModule(x + dx, y + dy, Math.max(Math.abs(dx), Math.abs(dy)) != 1);
            }
        }
        // Sets the color of a module and marks it as a function module.
        // Only used by the constructor. Coordinates must be in bounds.
        setFunctionModule(x, y, isDark) {
            this.modules[y][x] = isDark;
            this.isFunction[y][x] = true;
        }
        /*-- Private helper methods for constructor: Codewords and masking --*/
        // Returns a new byte string representing the given data with the appropriate error correction
        // codewords appended to it, based on this object's version and error correction level.
        addEccAndInterleave(data) {
            const ver = this.version;
            const ecl = this.errorCorrectionLevel;
            if (data.length != QrCode.getNumDataCodewords(ver, ecl))

        Ecc.HIGH = new Ecc(3, 2); // The QR Code can tolerate about 30% erroneous codewords
        QrCode.Ecc = Ecc;
    })(QrCode = qrcodegen.QrCode || (qrcodegen.QrCode = {}));
})(qrcodegen || (qrcodegen = {}));
/*---- Public helper enumeration ----*/
(function (qrcodegen) {
    var QrSegment;
    (function (QrSegment) {
        /*
         * Describes how a segment's data bits are interpreted. Immutable.
         */
        class Mode {
            /*-- Constructor and fields --*/
            constructor(
            // The mode indicator bits, which is a uint4 value (range 0 to 15).
            modeBits, 
            // Number of character count bits for three different version ranges.
            numBitsCharCount) {
                this.modeBits = modeBits;
                this.numBitsCharCount = numBitsCharCount;
            }
            /*-- Method --*/
            // (Package-private) Returns the bit width of the character count field for a segment in
            // this mode in a QR Code at the given version number. The result is in the range [0, 16].
            numCharCountBits(ver) {
                return this.numBitsCharCount[Math.floor((ver + 7) / 17)];
            }
        }
        /*-- Constants --*/
        Mode.NUMERIC = new Mode(0x1, [10, 12, 14]);
        Mode.ALPHANUMERIC = new Mode(0x2, [9, 11, 13]);
        Mode.BYTE = new Mode(0x4, [8, 16, 16]);
        Mode.KANJI = new Mode(0x8, [8, 10, 12]);
        Mode.ECI = new Mode(0x7, [0, 0, 0]);
        QrSegment.Mode = Mode;
    })(QrSegment = qrcodegen.QrSegment || (qrcodegen.QrSegment = {}));
})(qrcodegen || (qrcodegen = {}));
if(typeof window!=="undefined")window.qrcodegen=qrcodegen;


// ===== APP =====
var CFG={SECRET_KEY:"DEFAULT_KEY",CLIENT_ID:"CLIENT_001",VER:"1.0"};
var gpsData=null,gpsState="searching",gpsWatch=null;
var stream=null,facing="environment",torchOn=false,torchOk=false,deferredPWA=null;

function $(id){return document.getElementById(id);}
function p2(n){return String(n).padStart(2,"0");}

function setStep(t){$("step").textContent=t;}

function showErr(icon,title,msg){
  $("s-load").style.display="none";
  $("s-cam").style.display="none";
  $("s-err").style.display="flex";
  $("ei").textContent=icon;
  $("et").textContent=title;
  $("em").textContent=msg;
}

function toast(msg,dur){
  if(!dur)dur=2300;
  var t=$("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},dur);
}

function translit(s){
  var m={
    "А":"A","Б":"B","В":"V","Г":"G","Д":"D","Е":"E","Ё":"YO","Ж":"ZH","З":"Z",
    "И":"I","Й":"Y","К":"K","Л":"L","М":"M","Н":"N","О":"O","П":"P","Р":"R",
    "С":"S","Т":"T","У":"U","Ф":"F","Х":"KH","Ц":"TS","Ч":"CH","Ш":"SH",
    "Щ":"SCH","Ъ":"","Ы":"Y","Ь":"","Э":"E","Ю":"YU","Я":"YA",
    "а":"a","б":"b","в":"v","г":"g","д":"d","е":"e","ё":"yo","ж":"zh","з":"z",
    "и":"i","й":"y","к":"k","л":"l","м":"m","н":"n","о":"o","п":"p","р":"r",
    "с":"s","т":"t","у":"u","ф":"f","х":"kh","ц":"ts","ч":"ch","ш":"sh",
    "щ":"sch","ъ":"","ы":"y","ь":"","э":"e","ю":"yu","я":"ya"
  };
  return s.split("").map(function(c){return m[c]!==undefined?m[c]:c;}).join("");
}

async function computeHMAC(key,msg){
  var enc=new TextEncoder();
  var k=await crypto.subtle.importKey("raw",enc.encode(key),{name:"HMAC",hash:"SHA-256"},false,["sign"]);
  var s=await crypto.subtle.sign("HMAC",k,enc.encode(msg));
  return Array.from(new Uint8Array(s)).map(function(b){return b.toString(16).padStart(2,"0");}).join("").toUpperCase().slice(0,16);
}

function nowISO(){
  var d=new Date();
  return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate())+"T"+p2(d.getHours())+":"+p2(d.getMinutes())+":"+p2(d.getSeconds());
}

function clockTick(){
  var d=new Date();
  $("clock").textContent=p2(d.getHours())+":"+p2(d.getMinutes())+":"+p2(d.getSeconds());
}

// ===== GPS =====
function updateGPS(){
  var b=$("gbadge"),sh=$("shut"),ov=$("gps-ov");
  if(gpsState==="active"&&gpsData){
    b.className="active";
    b.textContent="⌖ "+gpsData.lat.toFixed(5)+" "+gpsData.lon.toFixed(5);
    sh.disabled=false;sh.classList.remove("locked");
    ov.classList.remove("vis");
  }else if(gpsState==="lost"){
    b.className="lost";b.textContent="⌖ GPS потерян";
    sh.disabled=true;sh.classList.add("locked");
    ov.classList.add("vis");
  }else{
    b.className="searching";b.textContent="⌖ GPS…";
    sh.disabled=true;sh.classList.add("locked");
    ov.classList.add("vis");
  }
}

function startGPS(){
  if(!navigator.geolocation){showErr("📍","GPS недоступен","Браузер не поддерживает геолокацию.");return;}
  gpsState="searching";updateGPS();
  navigator.geolocation.getCurrentPosition(
    function(p){gpsData={lat:p.coords.latitude,lon:p.coords.longitude};gpsState="active";updateGPS();},
    function(){},
    {enableHighAccuracy:true,timeout:11000,maximumAge:0}
  );
  gpsWatch=navigator.geolocation.watchPosition(
    function(p){gpsData={lat:p.coords.latitude,lon:p.coords.longitude};gpsState="active";updateGPS();},
    function(){gpsState="lost";updateGPS();},
    {enableHighAccuracy:true,maximumAge:5000}
  );
}

function retryGPS(){
  if(gpsWatch!==null){navigator.geolocation.clearWatch(gpsWatch);gpsWatch=null;}
  gpsState="searching";updateGPS();startGPS();
}

// ===== CAMERA =====
async function startCam(){
  try{
    if(stream)stream.getTracks().forEach(function(t){t.stop();});
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing,width:{ideal:4096},height:{ideal:2160}},audio:false
    });
    var v=$("video");v.srcObject=stream;
    await new Promise(function(res){
      v.onloadedmetadata=res;
      v.onplaying=res;
      setTimeout(res,5000);
    });
    await v.play().catch(function(){});
    setupCaps();
  }catch(e){
    showErr("📷","Нет доступа к камере",
      "Разрешите доступ к камере:\nНастройки → Конфиденциальность → Камера\n→ Chrome → Разрешить\n\nЗатем нажмите «Повторить».");
  }
}

function setupCaps(){
  var tr=stream&&stream.getVideoTracks()[0];
  if(!tr)return;
  var caps=tr.getCapabilities?tr.getCapabilities():{};
  torchOk=!!caps.torch;
  var tb=$("tbtn");tb.disabled=!torchOk;
  if(!torchOk)tb.title="Вспышка не поддерживается";
  var zw=$("zoom-w");
  if(caps.zoom){
    zw.classList.add("vis");
    var sl=$("zslider");
    sl.min=caps.zoom.min||1;sl.max=caps.zoom.max||5;
    sl.step=caps.zoom.step||0.1;sl.value=caps.zoom.min||1;
    sl.oninput=async function(){
      var v=parseFloat(sl.value);
      $("zval").textContent=v.toFixed(1)+"×";
      try{await tr.applyConstraints({advanced:[{zoom:v}]});}catch(e){}
    };
  }else{zw.classList.remove("vis");}
}

function toggleTorch(){
  if(!torchOk){toast("⚡ Вспышка не поддерживается");return;}
  var tr=stream.getVideoTracks()[0];
  torchOn=!torchOn;
  tr.applyConstraints({advanced:[{torch:torchOn}]}).catch(function(){});
  $("tbtn").classList.toggle("on",torchOn);
}

function flipCam(){
  facing=facing==="environment"?"user":"environment";
  torchOn=false;$("tbtn").classList.remove("on");
  startCam();
}

// ===== QR roundRect polyfill =====
function rrect(ctx,x,y,w,h,r){
  if(typeof ctx.roundRect==="function"){
    ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  }else{
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }
}

// ===== DRAW QR ON PHOTO =====
// canvasW/H — реальные пиксели фото (могут быть 3000x4000 или 1920x1080)
// QR всегда в нижнем левом углу относительно canvas координат
function drawQROnPhoto(ctx, qrText, canvasW, canvasH, dateStr, gpsStr, sig){
  // Get QrCode from nayuki lib (set as window.qrcodegen by the lib itself)
  var QC=null;
  if(typeof qrcodegen!=="undefined"&&qrcodegen&&qrcodegen.QrCode){
    QC=qrcodegen.QrCode;
  }
  if(!QC){
    console.error("QR lib not found! typeof qrcodegen=",typeof qrcodegen);
    // Draw visible error on photo
    ctx.fillStyle="rgba(255,0,80,0.9)";
    ctx.fillRect(10,canvasH-90,300,80);
    ctx.fillStyle="#fff";ctx.font="bold 16px monospace";
    ctx.textBaseline="top";ctx.textAlign="left";
    ctx.fillText("QR ERROR: lib missing",16,canvasH-80);
    return;
  }

  var qr;
  try{
    qr=QC.encodeText(qrText, QC.Ecc.MEDIUM);
  }catch(e){
    console.error("QR encode failed:",e.message,"text:",qrText);
    ctx.fillStyle="rgba(255,0,80,0.9)";
    ctx.fillRect(10,canvasH-90,300,80);
    ctx.fillStyle="#fff";ctx.font="bold 13px monospace";
    ctx.textBaseline="top";ctx.textAlign="left";
    ctx.fillText("QR ENCODE ERR:",16,canvasH-80);
    ctx.fillText(e.message.slice(0,28),16,canvasH-60);
    return;
  }

  // Размеры: 19% от короткой стороны, минимум 140px
  var shorter  = Math.min(canvasW, canvasH);
  var qrPx     = Math.max(140, Math.round(shorter * 0.19));
  var mg       = Math.round(shorter * 0.025);   // отступ от края
  var pad      = Math.round(qrPx * 0.07);       // внутренний отступ белого блока
  var lineH    = Math.max(12, Math.round(shorter * 0.014));
  var textBlk  = lineH*3 + Math.round(lineH*0.6); // высота текстового блока
  var bgW      = qrPx + pad*2;
  var bgH      = qrPx + pad*2 + textBlk;

  // Всегда нижний левый угол canvas
  var bx = mg;
  var by = canvasH - bgH - mg;
  var qx = bx + pad;
  var qy = by + pad;

  // Shadow
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,0.55)";
  ctx.shadowBlur=20;ctx.shadowOffsetX=3;ctx.shadowOffsetY=4;
  ctx.fillStyle="#ffffff";
  rrect(ctx,bx,by,bgW,bgH,10);
  ctx.fill();
  ctx.restore();

  // White background (no shadow)
  ctx.fillStyle="#ffffff";
  rrect(ctx,bx,by,bgW,bgH,10);
  ctx.fill();

  // QR modules — dark squares on white bg
  var cell=qrPx/qr.size;
  ctx.fillStyle="#111111";
  for(var row=0;row<qr.size;row++){
    for(var col=0;col<qr.size;col++){
      if(qr.getModule(col,row)){
        ctx.fillRect(
          Math.round(qx+col*cell),
          Math.round(qy+row*cell),
          Math.max(1,Math.ceil(cell)),
          Math.max(1,Math.ceil(cell))
        );
      }
    }
  }

  // Logo in center of QR: white square → dark bg → green V
  var ls=Math.round(qrPx*0.22);
  var lx=Math.round(qx+qrPx/2-ls/2);
  var ly=Math.round(qy+qrPx/2-ls/2);
  ctx.fillStyle="#ffffff";ctx.fillRect(lx-3,ly-3,ls+6,ls+6);
  ctx.fillStyle="#0a0a18";ctx.fillRect(lx,ly,ls,ls);
  ctx.fillStyle="#00ff88";
  var fSz=Math.round(ls*0.62);
  ctx.font="bold "+fSz+"px monospace";
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText("V",lx+ls/2,ly+ls/2+1);

  // Info text below QR
  ctx.textAlign="left";ctx.textBaseline="top";
  ctx.fillStyle="#333333";
  ctx.font=lineH+"px monospace";
  var ty=by+pad+qrPx+Math.round(lineH*0.3);
  ctx.fillText(dateStr,      qx, ty);
  ctx.fillText(gpsStr,       qx, ty+lineH+2);
  ctx.fillText("SIG:"+sig,   qx, ty+(lineH+2)*2);

  console.log("[ВерифиКам] QR drawn: "+qr.size+"x"+qr.size+" at ("+bx+","+by+") on "+canvasW+"x"+canvasH+" canvas");
}

// ===== TAKE PHOTO =====
async function takePhoto(){
  if(gpsState!=="active"||!gpsData){toast("❌ Нет GPS сигнала");return;}

  // Flash
  var fl=$("flash");fl.classList.add("on");
  setTimeout(function(){fl.classList.remove("on");},120);

  var v=$("video");
  var cv=$("cv");
  var vw=v.videoWidth||1920;
  var vh=v.videoHeight||1080;
  cv.width=vw;
  cv.height=vh;
  var ctx=cv.getContext("2d");

  // Draw video frame
  // Фронтальная камера — зеркалим горизонтально
  if(facing==="user"){
    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(v,-vw,0,vw,vh);
    ctx.restore();
  }else{
    ctx.drawImage(v,0,0,vw,vh);
  }
  // ВАЖНО: не трогаем трансформацию canvas после drawImage.
  // QR рисуем в координатах canvas (0,0 = верхний левый угол изображения).
  // bottom-left в координатах canvas = (mg, canvasH - bgH - mg)

  // Build payload
  var now=new Date();
  var dateStr=nowISO();
  var gpsStr=gpsData.lat.toFixed(6)+","+gpsData.lon.toFixed(6);
  var idRaw=translit(CFG.CLIENT_ID).toUpperCase();
  var idClean=idRaw.replace(/[^A-Z0-9_\-]/g,"_");
  var payload=idClean+"|"+dateStr+"|"+gpsStr;

  var sig="NOSIG";
  try{sig=await computeHMAC(CFG.SECRET_KEY,payload);}catch(e){console.error("HMAC error",e);}

  var qrText=idClean+"|"+dateStr+"|"+gpsStr+"|"+sig+"|"+CFG.VER;
  console.log("[ВерифиКам] qrText=",qrText,"len=",qrText.length);

  // Draw QR on photo canvas
  drawQROnPhoto(ctx, qrText, vw, vh, dateStr, gpsStr, sig);

  // Save file
  cv.toBlob(function(blob){
    if(!blob){toast("❌ Ошибка создания фото");return;}
    var y=now.getFullYear(),mo=p2(now.getMonth()+1),d=p2(now.getDate());
    var h=p2(now.getHours()),mi=p2(now.getMinutes()),s=p2(now.getSeconds());
    var fn="VERIFY_"+CFG.CLIENT_ID+"_"+y+mo+d+"_"+h+mi+s+".jpg";
    var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
    if(isIOS){
      window.open(URL.createObjectURL(blob),"_blank");
      toast("📱 Удержите → Добавить в Фото",3500);
    }else{
      var u=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=u;a.download=fn;
      document.body.appendChild(a);a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(u);
      toast("✓ Сохранено");
    }
  },"image/jpeg",0.94);
}

// ===== PWA =====
window.addEventListener("beforeinstallprompt",function(e){
  e.preventDefault();deferredPWA=e;
  $("inst").classList.add("vis");
});

async function installPWA(){
  if(!deferredPWA){toast("Нажмите ⋮ → Добавить на гл. экран");return;}
  deferredPWA.prompt();
  await deferredPWA.userChoice;
  deferredPWA=null;$("inst").classList.remove("vis");
}

// ===== INIT =====
function retryInit(){
  $("s-err").style.display="none";
  $("s-load").style.display="flex";
  init();
}

async function init(){
  try{
    setStep("Загрузка конфигурации…");
    var urlId=new URLSearchParams(location.search).get("id");
    try{
      var r=await fetch("config.json",{cache:"no-cache"});
      if(r.ok)Object.assign(CFG,await r.json());
    }catch(e){}
    if(urlId)CFG.CLIENT_ID=urlId;
    $("cid").textContent=CFG.CLIENT_ID;

    // Verify QR lib loaded
    if(typeof qrcodegen==="undefined"||!qrcodegen||!qrcodegen.QrCode){
      console.error("QR lib NOT loaded at init time!");
    }else{
      console.log("[ВерифиКам] QR lib OK, QrCode available");
    }

    setStep("Открываем камеру…");
    await startCam();

    setStep("Определяем GPS…");
    startGPS();

    $("s-load").style.display="none";
    $("s-cam").style.display="flex";

    clockTick();setInterval(clockTick,1000);

    if("serviceWorker"in navigator){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    }
  }catch(e){
    showErr("⚠️","Ошибка запуска",e.message||"Обновите страницу.");
  }
}

window.addEventListener("DOMContentLoaded",init);
</script>
