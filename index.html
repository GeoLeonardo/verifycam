<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="theme-color" content="#000000">
<title>ВерифиКам</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#00ff88;--y:#ffcc00;--r:#ff3355;--b:#00aaff;--dim:rgba(255,255,255,.5)}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;
  font-family:'Courier New',monospace;touch-action:none;
  -webkit-user-select:none;user-select:none}

/* LOADING */
#s-load{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;gap:20px}
.logo{font-size:26px;font-weight:700;letter-spacing:5px;color:#fff}
.logo span{color:var(--g)}
.spin{width:44px;height:44px;border:2px solid rgba(255,255,255,.1);
  border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.step{font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;min-height:16px}

/* ERROR */
#s-err{position:fixed;inset:0;background:#080808;display:none;flex-direction:column;
  align-items:center;justify-content:center;z-index:90;padding:28px;gap:16px;text-align:center}
.ei{font-size:60px}.et{font-size:18px;font-weight:700;letter-spacing:2px;color:var(--r)}
.em{font-size:12px;line-height:1.8;color:var(--dim);max-width:300px;white-space:pre-line}
.ebtn{margin-top:6px;padding:12px 32px;background:transparent;border:1px solid var(--g);
  color:var(--g);font-family:inherit;font-size:12px;letter-spacing:3px;
  text-transform:uppercase;cursor:pointer;transition:.2s}
.ebtn:hover{background:var(--g);color:#000}

/* CAMERA SCREEN */
#s-cam{position:fixed;inset:0;background:#000;display:none;flex-direction:column}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}

/* overlay */
#overlay{position:absolute;inset:0;z-index:2;pointer-events:none}
.gl{position:absolute;background:rgba(255,255,255,.15)}
.gh1{top:33.33%;left:0;right:0;height:1px}
.gh2{top:66.66%;left:0;right:0;height:1px}
.gv1{left:33.33%;top:0;bottom:0;width:1px}
.gv2{left:66.66%;top:0;bottom:0;width:1px}
.cor{position:absolute;width:20px;height:20px;border-color:rgba(255,255,255,.75);border-style:solid}
.ctl{top:10%;left:5%;border-width:2px 0 0 2px}
.ctr{top:10%;right:5%;border-width:2px 2px 0 0}
.cbl{bottom:22%;left:5%;border-width:0 0 2px 2px}
.cbr{bottom:22%;right:5%;border-width:0 2px 2px 0}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;z-index:3;
  background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent)}
#clock{font-size:16px;font-weight:700;letter-spacing:1px;
  text-shadow:0 1px 3px rgba(0,0,0,.8)}
#gbadge{font-size:10px;letter-spacing:1px;padding:4px 9px;border-radius:20px;font-weight:600;transition:.3s}
#gbadge.searching{background:rgba(255,204,0,.15);color:var(--y);border:1px solid var(--y);animation:blink 1s ease-in-out infinite}
#gbadge.active{background:rgba(0,255,136,.12);color:var(--g);border:1px solid var(--g)}
#gbadge.lost{background:rgba(255,51,85,.15);color:var(--r);border:1px solid var(--r);animation:blink .5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* GPS lost overlay */
#gps-ov{position:fixed;inset:0;background:rgba(0,0,0,.93);display:none;
  flex-direction:column;align-items:center;justify-content:center;
  z-index:40;padding:28px;gap:16px;text-align:center}
#gps-ov.vis{display:flex}

/* client id */
#cid{position:absolute;z-index:3;left:0;right:0;text-align:center;
  font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.4);text-transform:uppercase;
  bottom:calc(80px + env(safe-area-inset-bottom) + 18px)}

/* zoom */
#zoom-w{position:absolute;z-index:3;
  bottom:calc(80px + env(safe-area-inset-bottom) + 54px);
  left:50%;transform:translateX(-50%);
  display:none;align-items:center;gap:10px}
#zoom-w.vis{display:flex}
#zval{font-size:11px;color:var(--dim);width:30px;text-align:right}
#zslider{-webkit-appearance:none;appearance:none;width:110px;height:3px;
  background:rgba(255,255,255,.25);border-radius:2px;outline:none}
#zslider::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;
  border-radius:50%;background:var(--g);cursor:pointer}

/* bottom bar */
#bot{position:absolute;bottom:0;left:0;right:0;
  padding:14px 36px calc(14px + env(safe-area-inset-bottom));
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(to top,rgba(0,0,0,.78),transparent);z-index:3}
.cbtn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);color:#fff;font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s;
  -webkit-tap-highlight-color:transparent}
.cbtn:active{transform:scale(.88);background:rgba(255,255,255,.22)}
.cbtn:disabled{opacity:.3;cursor:not-allowed}
.cbtn.on{background:rgba(255,204,0,.2);border-color:var(--y);color:var(--y)}

#shut{width:70px;height:70px;background:rgba(255,255,255,.88);
  border:3px solid rgba(255,255,255,.35);border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 4px rgba(255,255,255,.12);position:relative;transition:.15s;
  -webkit-tap-highlight-color:transparent}
#shut::after{content:'';width:54px;height:54px;border-radius:50%;
  background:rgba(255,255,255,.93);position:absolute}
#shut:active{transform:scale(.92)}
#shut:disabled{opacity:.3;cursor:not-allowed}
#shut.locked::after{background:var(--r)}

/* flash */
#flash{position:fixed;inset:0;background:#fff;opacity:0;
  pointer-events:none;z-index:50;transition:opacity .12s}
#flash.on{opacity:1}

/* toast */
#toast{position:fixed;left:50%;transform:translateX(-50%) translateY(16px);
  bottom:calc(96px + env(safe-area-inset-bottom));
  background:rgba(0,255,136,.12);border:1px solid var(--g);color:var(--g);
  padding:9px 22px;border-radius:22px;font-size:12px;letter-spacing:2px;
  white-space:nowrap;opacity:0;transition:.3s;z-index:60;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* install */
#inst{position:fixed;top:10px;left:50%;transform:translateX(-50%);
  padding:7px 18px;background:rgba(0,170,255,.12);border:1px solid var(--b);
  color:var(--b);font-family:inherit;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;border-radius:20px;z-index:80;display:none}
#inst.vis{display:block}
</style>
</head>
<body>

<div id="s-load">
  <div class="logo">Вери<span>Фи</span>Кам</div>
  <div class="spin"></div>
  <div class="step" id="step">Инициализация…</div>
</div>

<div id="s-err">
  <div class="ei" id="ei">📷</div>
  <div class="et" id="et">Ошибка</div>
  <div class="em" id="em"></div>
  <button class="ebtn" onclick="retryInit()">Повторить</button>
</div>

<div id="gps-ov">
  <div style="font-size:54px">📡</div>
  <div style="font-size:17px;font-weight:700;letter-spacing:2px;color:var(--r)">GPS НЕ ОПРЕДЕЛЁН</div>
  <div style="font-size:12px;line-height:1.8;color:var(--dim);max-width:290px">
    Съёмка без GPS невозможна.<br><br>
    1. Настройки → Местоположение → Включить<br>
    2. Разрешите геолокацию для браузера<br>
    3. Выйдите на открытое место<br>
    4. Подождите 10–30 секунд
  </div>
  <button class="ebtn" onclick="retryGPS()">Повторить GPS</button>
</div>

<div id="s-cam">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay">
    <div class="gl gh1"></div><div class="gl gh2"></div>
    <div class="gl gv1"></div><div class="gl gv2"></div>
    <div class="cor ctl"></div><div class="cor ctr"></div>
    <div class="cor cbl"></div><div class="cor cbr"></div>
  </div>
  <div id="hud">
    <div id="clock">00:00:00</div>
    <div id="gbadge" class="searching">⌖ GPS…</div>
  </div>
  <div id="zoom-w">
    <span id="zval">1×</span>
    <input type="range" id="zslider" min="1" max="5" step="0.1" value="1">
  </div>
  <div id="cid"></div>
  <div id="bot">
    <button class="cbtn" id="tbtn" onclick="toggleTorch()" title="Вспышка">🔦</button>
    <button id="shut" onclick="takePhoto()" disabled></button>
    <button class="cbtn" onclick="flipCam()" title="Переключить">⟳</button>
  </div>
</div>

<div id="flash"></div>
<div id="toast"></div>
<button id="inst" onclick="installPWA()">⬇ Установить</button>
<canvas id="cv" style="display:none"></canvas>

<script>

var qrcodegen=(function(){"use strict";

getModule(x,y){return 0<=x&&x<this.size&&0<=y&&y<this.size&&this.modules[y][x]}

drawFinder(cx,cy){

  let i=0;

  let res=0;const m=this.modules,sz=this.size;

static makeAlphanumeric(text){const bb=[];for(let i=0;i+2<=text.length;i+=2){appendBits(QrSegment.ALPHANUMERIC_CHARSET.indexOf(text[i])*45+QrSegment.ALPHANUMERIC_CHARSET.indexOf(text[i+1]),11,bb)}if(text.length%2!=0)appendBits(QrSegment.ALPHANUMERIC_CHARSET.indexOf(text[text.length-1]),6,bb);return new QrSegment(QrSegment.Mode.ALPHANUMERIC,text.length,bb)}
static makeSegments(text){if(text=='')return[];if(QrSegment.NUMERIC_REGEX.test(text))return[QrSegment.makeNumeric(text)];if(QrSegment.ALPHANUMERIC_REGEX.test(text))return[QrSegment.makeAlphanumeric(text)];const bb=[];for(const b of new TextEncoder().encode(text))bb.push(b);return[QrSegment.makeBytes(bb)]}
static isNumeric(t){return QrSegment.NUMERIC_REGEX.test(t)}
static isAlphanumeric(t){return QrSegment.ALPHANUMERIC_REGEX.test(t)}
constructor(mode,numChars,bitData){this.mode=mode;this.numChars=numChars;this.data=bitData}
getData(){return this.data.slice()}
static getTotalBits(segs,ver){let r=0;for(const s of segs){const ccb=s.mode.numCharCountBits(ver);r+=4+ccb+s.data.length}return r}
}
QrSegment.NUMERIC_REGEX=/^[0-9]*$/;
QrSegment.ALPHANUMERIC_REGEX=/^[A-Z0-9 $%*+.\/:-]*$/;
QrSegment.ALPHANUMERIC_CHARSET='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:';
class ModeClass{constructor(mb,nbcc){this.modeBits=mb;this.numBitsCharCount=nbcc}numCharCountBits(v){return this.numBitsCharCount[v<=9?0:v<=26?1:2]}}
QrSegment.Mode={NUMERIC:new ModeClass(0x1,[10,12,14]),ALPHANUMERIC:new ModeClass(0x2,[9,11,13]),BYTE:new ModeClass(0x4,[8,16,16]),KANJI:new ModeClass(0x8,[8,10,12]),ECI:new ModeClass(0x7,[0,0,0])};
class ReedSol{constructor(degree){let coefs=new Array(degree-1).fill(0);coefs.push(1);let root=1;for(let i=0;i<degree;i++){for(let j=0;j<coefs.length;j++){coefs[j]=ReedSol.mul(coefs[j],root);if(j+1<coefs.length)coefs[j]^=coefs[j+1]}root=ReedSol.mul(root,0x02)}this.coef=coefs}
getRemainder(data){let res=new Array(this.coef.length).fill(0);for(const b of data){const f=b^res.shift();res.push(0);for(let i=0;i<res.length;i++)res[i]^=ReedSol.mul(this.coef[i],f)}return res}
static mul(x,y){let z=0;for(let i=7;i>=0;i--){z=(z<<1)^((z>>>7)*0x11D);z^=((y>>>i)&1)*x}return z}}
function appendBits(val,len,bb){if(len<0||len>31||val>>>len!=0)throw new RangeError();for(let i=len-1;i>=0;i--)bb.push((val>>>i)&1)}
function getBit(x,i){return((x>>>i)&1)!=0}
function makeArr(len,fn){return Array.from({length:len},fn)}
return{QrCode,QrSegment};
})();

// =====================================================
// APP
// =====================================================
let CFG={SECRET_KEY:'DEFAULT_KEY',CLIENT_ID:'CLIENT_001',VER:'1.0'};
let gpsData=null,gpsState='searching',gpsWatch=null;
let stream=null,facing='environment',torchOn=false,torchOk=false,deferredPWA=null;

const $=id=>document.getElementById(id);
const p2=n=>String(n).padStart(2,'0');

function setStep(t){$('step').textContent=t}

function showErr(icon,title,msg){
  $('s-load').style.display='none';
  $('s-cam').style.display='none';
  $('s-err').style.display='flex';
  $('ei').textContent=icon;
  $('et').textContent=title;
  $('em').textContent=msg;
}

function toast(msg,dur=2300){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function translit(s){
  const m={'А':'A','Б':'B','В':'V','Г':'G','Д':'D','Е':'E','Ё':'YO','Ж':'ZH','З':'Z','И':'I','Й':'Y','К':'K','Л':'L','М':'M','Н':'N','О':'O','П':'P','Р':'R','С':'S','Т':'T','У':'U','Ф':'F','Х':'KH','Ц':'TS','Ч':'CH','Ш':'SH','Щ':'SCH','Ъ':'','Ы':'Y','Ь':'','Э':'E','Ю':'YU','Я':'YA','а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
  return s.split('').map(c=>m[c]!==undefined?m[c]:c).join('');
}

async function hmac(key,msg){
  const enc=new TextEncoder();
  const k=await crypto.subtle.importKey('raw',enc.encode(key),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const s=await crypto.subtle.sign('HMAC',k,enc.encode(msg));
  return Array.from(new Uint8Array(s)).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase().slice(0,16);
}

function nowISO(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}T${p2(d.getHours())}:${p2(d.getMinutes())}:${p2(d.getSeconds())}`}

function clockTick(){const d=new Date();$('clock').textContent=`${p2(d.getHours())}:${p2(d.getMinutes())}:${p2(d.getSeconds())}`}

// GPS
function updateGPS(){
  const b=$('gbadge'),sh=$('shut'),ov=$('gps-ov');
  if(gpsState==='active'&&gpsData){
    b.className='active';
    b.textContent=`⌖ ${gpsData.lat.toFixed(5)} ${gpsData.lon.toFixed(5)}`;
    sh.disabled=false;sh.classList.remove('locked');
    ov.classList.remove('vis');
  }else if(gpsState==='lost'){
    b.className='lost';b.textContent='⌖ GPS потерян';
    sh.disabled=true;sh.classList.add('locked');
    ov.classList.add('vis');
  }else{
    b.className='searching';b.textContent='⌖ GPS…';
    sh.disabled=true;sh.classList.add('locked');
    ov.classList.add('vis');
  }
}

function startGPS(){
  if(!navigator.geolocation){showErr('📍','GPS недоступен','Браузер не поддерживает геолокацию.');return;}
  gpsState='searching';updateGPS();
  navigator.geolocation.getCurrentPosition(
    p=>{gpsData={lat:p.coords.latitude,lon:p.coords.longitude};gpsState='active';updateGPS();},
    ()=>{},
    {enableHighAccuracy:true,timeout:11000,maximumAge:0}
  );
  gpsWatch=navigator.geolocation.watchPosition(
    p=>{gpsData={lat:p.coords.latitude,lon:p.coords.longitude};gpsState='active';updateGPS();},
    ()=>{gpsState='lost';updateGPS();},
    {enableHighAccuracy:true,maximumAge:5000}
  );
}

function retryGPS(){
  if(gpsWatch!==null)navigator.geolocation.clearWatch(gpsWatch);
  gpsState='searching';updateGPS();startGPS();
}

// Camera
async function startCam(){
  try{
    if(stream)stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing,width:{ideal:4096},height:{ideal:2160}},audio:false
    });
    const v=$('video');v.srcObject=stream;
    await new Promise(res=>{v.onloadedmetadata=res;v.onplaying=res;setTimeout(res,5000)});
    await v.play().catch(()=>{});
    setupCaps();
  }catch(e){
    showErr('📷','Нет доступа к камере',
      'Разрешите доступ к камере:\nНастройки → Конфиденциальность → Камера\n→ Chrome → Разрешить\n\nЗатем нажмите «Повторить».');
  }
}

function setupCaps(){
  const tr=stream&&stream.getVideoTracks()[0];if(!tr)return;
  const caps=tr.getCapabilities?tr.getCapabilities():{};
  torchOk=!!caps.torch;
  const tb=$('tbtn');tb.disabled=!torchOk;
  if(!torchOk)tb.title='Вспышка не поддерживается';
  const zw=$('zoom-w');
  if(caps.zoom){
    zw.classList.add('vis');
    const sl=$('zslider');
    sl.min=caps.zoom.min||1;sl.max=caps.zoom.max||5;
    sl.step=caps.zoom.step||0.1;sl.value=caps.zoom.min||1;
    sl.oninput=async()=>{
      const v=parseFloat(sl.value);
      $('zval').textContent=v.toFixed(1)+'×';
      try{await tr.applyConstraints({advanced:[{zoom:v}]})}catch(e){}
    };
  }else{zw.classList.remove('vis')}
}

function toggleTorch(){
  if(!torchOk){toast('⚡ Вспышка не поддерживается');return;}
  const tr=stream.getVideoTracks()[0];torchOn=!torchOn;
  tr.applyConstraints({advanced:[{torch:torchOn}]}).catch(()=>{});
  $('tbtn').classList.toggle('on',torchOn);
}

function flipCam(){facing=facing==='environment'?'user':'environment';torchOn=false;$('tbtn').classList.remove('on');startCam();}

// Photo
async function takePhoto(){
  if(gpsState!=='active'||!gpsData){toast('❌ Нет GPS');return;}
  const fl=$('flash');fl.classList.add('on');setTimeout(()=>fl.classList.remove('on'),120);
  const v=$('video'),cv=$('cv');
  cv.width=v.videoWidth||1920;cv.height=v.videoHeight||1080;
  const ctx=cv.getContext('2d');
  if(facing==='user'){ctx.save();ctx.scale(-1,1);ctx.drawImage(v,-cv.width,0,cv.width,cv.height);ctx.restore();}
  else ctx.drawImage(v,0,0,cv.width,cv.height);
  const now=new Date();
  const dateStr=nowISO();
  const gpsStr=`${gpsData.lat.toFixed(6)},${gpsData.lon.toFixed(6)}`;
  const idLat=translit(CFG.CLIENT_ID).toUpperCase().replace(/[^A-Z0-9_]/g,'_');
  const payload=`${idLat}|${dateStr}|${gpsStr}`;
  const sig=await hmac(CFG.SECRET_KEY,payload);
  const qrTxt=`${idLat}|${dateStr}|${gpsStr}|${sig}|${CFG.VER}`;
  await drawQR(ctx,qrTxt,cv.width,cv.height,dateStr,gpsStr,sig);
  cv.toBlob(blob=>{
    const fn=`VERIFY_${CFG.CLIENT_ID}_${now.getFullYear()}${p2(now.getMonth()+1)}${p2(now.getDate())}_${p2(now.getHours())}${p2(now.getMinutes())}${p2(now.getSeconds())}.jpg`;
    const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
    if(isIOS){window.open(URL.createObjectURL(blob),'_blank');toast('📱 Удержите фото → Добавить в Фото',3500);}
    else{const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);toast('✓ Сохранено');}
  },'image/jpeg',0.94);
}

async function drawQR(ctx,text,W,H,dateStr,gpsStr,sig){
  try{
    await new Promise(r=>setTimeout(r,0)); // yield
    const qr=qrcodegen.QrCode.encodeText(text,qrcodegen.QrCode.Ecc.MEDIUM);
    const shorter=Math.min(W,H);
    const qrPx=Math.max(100,Math.round(shorter*0.17));
    const mg=Math.round(shorter*0.022);
    const pad=10;
    const textH=46;
    const bgW=qrPx+pad*2;const bgH=qrPx+pad*2+textH;
    const bx=mg,by=H-bgH-mg;
    // shadow
    ctx.save();ctx.shadowColor='rgba(0,0,0,.35)';ctx.shadowBlur=14;ctx.shadowOffsetX=2;ctx.shadowOffsetY=3;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(bx,by,bgW,bgH,10);ctx.fill();ctx.restore();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(bx,by,bgW,bgH,10);ctx.fill();
    const qx=bx+pad,qy=by+pad;
    const cell=qrPx/qr.size;
    ctx.fillStyle='#111';
    for(let r=0;r<qr.size;r++)for(let c=0;c<qr.size;c++){
      if(qr.getModule(c,r))ctx.fillRect(qx+c*cell,qy+r*cell,cell,cell);
    }
    // logo center
    const ls=qrPx*0.22;const lx=qx+qrPx/2-ls/2,ly=qy+qrPx/2-ls/2;
    ctx.fillStyle='#fff';ctx.fillRect(lx-3,ly-3,ls+6,ls+6);
    ctx.fillStyle='#0f172a';ctx.fillRect(lx,ly,ls,ls);
    ctx.fillStyle='#00ff88';ctx.font=`bold ${Math.round(ls*.6)}px monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('V',lx+ls/2,ly+ls/2+1);ctx.textAlign='left';
    // text below
    const fs=Math.max(9,Math.round(shorter*0.012));
    ctx.fillStyle='#444';ctx.font=`${fs}px monospace`;ctx.textBaseline='top';
    ctx.fillText(dateStr,qx,by+pad+qrPx+4);
    ctx.fillText(gpsStr,qx,by+pad+qrPx+4+fs+3);
    ctx.fillText('SIG:'+sig,qx,by+pad+qrPx+4+(fs+3)*2);
  }catch(e){console.error('QR draw error',e);}
}

// PWA
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPWA=e;$('inst').classList.add('vis');});
async function installPWA(){
  if(!deferredPWA){toast('Нажмите ⋮ → Добавить на гл. экран');return;}
  deferredPWA.prompt();await deferredPWA.userChoice;deferredPWA=null;$('inst').classList.remove('vis');
}

// INIT
async function retryInit(){$('s-err').style.display='none';$('s-load').style.display='flex';init();}

async function init(){
  try{
    setStep('Загрузка конфигурации…');
    const urlId=new URLSearchParams(location.search).get('id');
    try{
      const r=await fetch('config.json',{cache:'no-cache'});
      if(r.ok)Object.assign(CFG,await r.json());
    }catch(e){}
    if(urlId)CFG.CLIENT_ID=urlId;
    $('cid').textContent=CFG.CLIENT_ID;
    setStep('Открываем камеру…');
    await startCam();
    setStep('Определяем GPS…');
    startGPS();
    $('s-load').style.display='none';
    $('s-cam').style.display='flex';
    clockTick();setInterval(clockTick,1000);
    if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  }catch(e){showErr('⚠️','Ошибка запуска',e.message||'Обновите страницу.');}
}
window.addEventListener('DOMContentLoaded',init);
